<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>匠人程工作台｜建议与任务协同系统</title>
    <style>
      :root {
        --bg: #f6f3ee;
        --panel: rgba(255, 255, 255, 0.96);
        --ink: #1f2933;
        --muted: #66717c;
        --line: rgba(31, 41, 51, 0.08);
        --brand: #0d9488;
        --brand-dark: #0f766e;
        --orange: #bc582e;
        --blue: #2563eb;
        --red: #b91c1c;
        --shadow: 0 18px 50px rgba(31, 41, 51, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(13, 148, 136, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(188, 88, 46, 0.10), transparent 24%),
          linear-gradient(180deg, #faf7f2 0%, #f0e7db 100%);
      }
      button, input, select, textarea { font: inherit; }
      .shell {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }
      .topbar,
      .card,
      .stat-card,
      .pipeline-column {
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.66);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
        padding: 14px 18px;
      }
      .brand-name { font-size: 18px; font-weight: 800; }
      .brand-subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .nav { display: flex; flex-wrap: wrap; gap: 8px; }
      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        color: var(--ink);
        text-decoration: none;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
        font-size: 13px;
      }
      .nav-link.active {
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
        color: #fff;
        border-color: transparent;
      }
      .card { padding: 24px; }
      .card + .card,
      .grid + .card,
      .card + .grid { margin-top: 18px; }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        gap: 18px;
        align-items: stretch;
      }
      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: clamp(30px, 4vw, 42px); line-height: 1.08; }
      h2 { font-size: 22px; }
      h3 { font-size: 17px; }
      p { color: var(--muted); line-height: 1.7; }
      .hero-text { margin-top: 12px; }
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .tag,
      .status-pill,
      .priority-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .tag {
        background: rgba(13, 148, 136, 0.10);
        color: var(--brand-dark);
      }
      .tag.orange {
        background: rgba(188, 88, 46, 0.10);
        color: var(--orange);
      }
      .auth-note {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(13, 148, 136, 0.08);
        border: 1px solid rgba(13, 148, 136, 0.16);
        color: var(--muted);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .stat-card { padding: 18px; }
      .stat-card span { color: var(--muted); font-size: 13px; }
      .stat-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        line-height: 1;
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(420px, 1.1fr);
        gap: 18px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      label.field {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      .field input,
      .field select,
      .field textarea,
      .filters input,
      .filters select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 12px;
        color: var(--ink);
        background: rgba(255,255,255,0.9);
      }
      .field textarea {
        min-height: 104px;
        resize: vertical;
        padding: 10px 12px;
      }
      .span-2 { grid-column: 1 / -1; }
      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .check-row input { width: 16px; height: 16px; }
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
        color: #fff;
        cursor: pointer;
        font-weight: 800;
      }
      .button.secondary {
        background: rgba(255,255,255,0.82);
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .button.danger {
        background: rgba(185, 28, 28, 0.1);
        color: var(--red);
      }
      .button:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }
      .filters {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 150px 150px 150px;
        gap: 10px;
        margin-top: 16px;
      }
      .suggestion-list {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }
      .suggestion-card {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        background: rgba(255,255,255,0.78);
      }
      .suggestion-card.overdue {
        border-color: rgba(185, 28, 28, 0.28);
        background: rgba(185, 28, 28, 0.045);
      }
      .suggestion-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .suggestion-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
      }
      .suggestion-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .suggestion-meta strong,
      .suggestion-content strong {
        color: var(--ink);
      }
      .suggestion-content {
        margin-top: 12px;
        color: var(--ink);
        line-height: 1.75;
      }
      .card-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      .status-pill.new { background: rgba(188, 88, 46, 0.12); color: var(--orange); }
      .status-pill.triage { background: rgba(37, 99, 235, 0.12); color: var(--blue); }
      .status-pill.approved { background: rgba(13, 148, 136, 0.12); color: var(--brand-dark); }
      .status-pill.assigned { background: rgba(99, 102, 241, 0.12); color: #4f46e5; }
      .status-pill.doing { background: rgba(124, 58, 237, 0.12); color: #6d28d9; }
      .status-pill.review { background: rgba(2, 132, 199, 0.12); color: #0369a1; }
      .status-pill.launched { background: rgba(22, 163, 74, 0.14); color: #15803d; }
      .status-pill.paused { background: rgba(100, 116, 139, 0.14); color: #475569; }
      .status-pill.reward { background: rgba(202, 138, 4, 0.16); color: #a16207; }
      .priority-pill.high { background: rgba(185, 28, 28, 0.10); color: var(--red); }
      .priority-pill.medium { background: rgba(188, 88, 46, 0.12); color: var(--orange); }
      .priority-pill.low { background: rgba(100, 116, 139, 0.12); color: #475569; }
      .manager-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(13, 148, 136, 0.05);
      }
      .manager-panel textarea {
        min-height: 74px;
      }
      .comment-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .comment-item {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255,255,255,0.88);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      .comment-details {
        margin-top: 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .comment-details summary {
        cursor: pointer;
        font-weight: 700;
        color: var(--ink);
      }
      .feedback-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }
      .feedback-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255,255,255,0.78);
      }
      .feedback-card.is-done {
        opacity: 0.72;
      }
      .feedback-card.is-mine {
        border-color: rgba(13, 148, 136, 0.24);
      }
      .feedback-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      .feedback-content {
        margin-top: 10px;
        color: var(--ink);
        line-height: 1.7;
      }
      .module-guide {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(13, 148, 136, 0.06);
        color: var(--ink);
        line-height: 1.7;
        white-space: pre-wrap;
      }
      .module-owner-link {
        margin-top: 12px;
      }
      .feedback-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .feedback-summary-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        background: rgba(255,255,255,0.76);
      }
      .feedback-summary-card span {
        color: var(--muted);
        font-size: 12px;
      }
      .feedback-summary-card strong {
        display: block;
        margin-top: 6px;
        font-size: 24px;
      }
      .feedback-rank-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 14px;
      }
      .feedback-toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 140px 140px auto;
        gap: 10px;
        margin-top: 14px;
      }
      .feedback-toolbar input,
      .feedback-toolbar select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 12px;
        background: rgba(255,255,255,0.9);
        color: var(--ink);
      }
      .muted {
        color: var(--muted);
      }
      .pipeline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .pipeline-column {
        padding: 14px;
        min-height: 190px;
      }
      .pipeline-column h3 {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
      }
      .pipeline-item {
        margin-top: 10px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
      }
      .pipeline-item strong {
        display: block;
        font-size: 13px;
      }
      .pipeline-item span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }
      .module-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }
      .module-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255,255,255,0.76);
      }
      .module-card strong { display: block; margin-bottom: 8px; }
      .empty {
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }
      .assign-modal {
        position: fixed;
        inset: 0;
        z-index: 80;
        display: grid;
        place-items: center;
        padding: 18px;
        background: rgba(31, 41, 51, 0.42);
      }
      .assign-modal[hidden] { display: none; }
      .assign-dialog {
        width: min(460px, 100%);
        padding: 22px;
        border-radius: 22px;
        border: 1px solid rgba(255,255,255,0.72);
        background: #fff;
        box-shadow: 0 24px 64px rgba(31, 41, 51, 0.24);
      }
      .assign-dialog .field {
        margin-top: 14px;
      }
      @media (max-width: 1080px) {
        .hero,
        .grid {
          grid-template-columns: 1fr;
        }
        .stat-grid,
        .pipeline,
        .module-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 720px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
        .stat-grid,
        .form-grid,
        .filters,
        .manager-panel,
        .feedback-grid,
        .feedback-summary,
        .feedback-rank-grid,
        .feedback-toolbar,
        .pipeline,
        .module-grid {
          grid-template-columns: 1fr;
        }
        .span-2 { grid-column: auto; }
      }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260623k">
  </head>
  <body data-page-permission="suggestions.access">
    <main class="shell">
      <section class="topbar">
        <div>
          <div class="brand-name">匠人程工作台</div>
          <div class="brand-subtitle">System 03 · 建议与任务协同系统</div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="./index.html">返回工作台</a>
        </nav>
      </section>

      <section class="hero">
        <article class="card">
          <p class="eyebrow">建议与任务</p>
          <h1>建议与任务协同系统</h1>
          <p class="hero-text">提出问题、公开查看、支持点赞；需要执行时派给负责人，完成后填写结果闭环。</p>
          <div class="tag-row">
            <span class="tag">全员可提交</span>
            <span class="tag">大家可支持</span>
            <span class="tag">一键派任务</span>
            <span class="tag orange">完成有反馈</span>
          </div>
          <div class="auth-note" data-role-greeting></div>
        </article>

        <aside class="card">
          <p class="eyebrow">轻量流程</p>
          <h2>怎么用</h2>
          <p style="margin-top: 10px;">问题先挂出来，大家可以支持；确实需要执行时，管理员派给负责人，负责人完成后填写结果。</p>
        </aside>
      </section>

      <section class="stat-grid" aria-label="建议统计">
        <article class="stat-card"><span>全部问题</span><strong id="statTotal">0</strong></article>
        <article class="stat-card"><span>待处理</span><strong id="statNew">0</strong></article>
        <article class="stat-card"><span>已派任务</span><strong id="statTask">0</strong></article>
        <article class="stat-card"><span>执行中</span><strong id="statReview">0</strong></article>
        <article class="stat-card"><span>已完成</span><strong id="statLaunched">0</strong></article>
        <article class="stat-card"><span>支持总数</span><strong id="statReward">0</strong></article>
      </section>

      <section class="grid">
        <article class="card">
          <p class="eyebrow">提交</p>
          <h2>提出问题或建议</h2>
          <form id="suggestionForm" class="form-grid">
            <label class="field" data-manager-only-field>
              事项类型
              <select name="entryType">
                <option value="suggestion" selected>员工建议</option>
                <option value="task">直接任务（管理员）</option>
              </select>
            </label>
            <label class="field">
              分类
              <select name="category">
                <option value="流程优化">流程优化</option>
                <option value="教学质量">教学质量</option>
                <option value="招生转化">招生转化</option>
                <option value="家长服务">家长服务</option>
                <option value="成本控制">成本控制</option>
                <option value="员工关怀">员工关怀</option>
                <option value="技术工具">技术工具</option>
                <option value="校区运营">校区运营</option>
              </select>
            </label>
            <label class="field">
              紧急程度
              <select name="impact">
                <option value="high">高：影响收入/安全/家长体验</option>
                <option value="medium" selected>中：影响效率或质量</option>
                <option value="low">低：局部优化</option>
              </select>
            </label>
            <label class="field span-2">
              标题
              <input name="title" required placeholder="例如：暑假班教室调换需要提前一天确认">
            </label>
            <label class="field span-2">
              具体说明
              <textarea name="content" required placeholder="写清楚发现的问题、影响到哪里、你觉得可以怎么改。"></textarea>
            </label>
            <label class="field" data-manager-only-field>
              建议处理人
              <select name="owner" id="ownerSelect"></select>
            </label>
            <label class="field" data-manager-only-field>
              希望完成时间
              <input name="dueDate" type="date">
            </label>
            <label class="check-row span-2">
              <input name="anonymous" type="checkbox">
              匿名提交给管理层
            </label>
          </form>
          <div class="actions">
            <button class="button" type="button" id="submitSuggestionButton">提交建议</button>
            <button class="button secondary" type="button" id="exportSuggestionsButton">导出建议 CSV</button>
          </div>
        </article>

        <article class="card">
          <p class="eyebrow">筛选</p>
          <h2>建议与任务筛选</h2>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索标题、内容、负责人">
            <select id="statusFilter">
              <option value="">全部状态</option>
              <option value="new">待处理</option>
              <option value="assigned">已派任务</option>
              <option value="doing">推进中</option>
              <option value="launched">已完成</option>
              <option value="paused">暂缓</option>
            </select>
            <select id="taskViewFilter">
              <option value="">全部事项</option>
              <option value="my">与我有关</option>
              <option value="owner">派给我</option>
              <option value="author">我提交</option>
              <option value="open">未完成任务</option>
              <option value="overdue">逾期任务</option>
            </select>
            <select id="categoryFilter">
              <option value="">全部分类</option>
              <option value="流程优化">流程优化</option>
              <option value="教学质量">教学质量</option>
              <option value="招生转化">招生转化</option>
              <option value="家长服务">家长服务</option>
              <option value="成本控制">成本控制</option>
              <option value="员工关怀">员工关怀</option>
              <option value="技术工具">技术工具</option>
              <option value="校区运营">校区运营</option>
            </select>
          </div>
          <div class="suggestion-list" id="suggestionList"></div>
        </article>
      </section>

      <section class="card">
        <p class="eyebrow">看板</p>
        <h2>建议与任务看板</h2>
        <div class="pipeline" id="pipelineBoard"></div>
      </section>

      <section class="card" id="siteFeedbackSection" hidden>
        <p class="eyebrow">试用反馈</p>
        <h2 id="siteFeedbackTitle">我的反馈问题</h2>
        <div class="feedback-summary" id="siteFeedbackSummary"></div>
        <div class="feedback-rank-grid" id="siteFeedbackRanks"></div>
        <div class="feedback-toolbar">
          <input id="siteFeedbackSearch" type="search" placeholder="搜索老师、系统、问题内容">
          <select id="siteFeedbackStatusFilter">
            <option value="">全部状态</option>
            <option value="待处理">待处理</option>
            <option value="已转任务">已转任务</option>
            <option value="已处理">已处理</option>
            <option value="已确认解决">已确认解决</option>
            <option value="继续反馈">继续反馈</option>
          </select>
          <select id="siteFeedbackSeverityFilter">
            <option value="">全部紧急度</option>
            <option value="紧急">紧急</option>
            <option value="普通">普通</option>
            <option value="可后置">可后置</option>
          </select>
          <button class="button secondary" type="button" id="exportFeedbackButton">导出反馈 CSV</button>
        </div>
        <div class="feedback-grid" id="siteFeedbackList"></div>
      </section>

    </main>
    <div class="assign-modal" id="assignTaskModal" hidden>
      <div class="assign-dialog">

      const assignableNames = () => {
        const names = (Array.isArray(window.JRC_EMPLOYEES) ? window.JRC_EMPLOYEES : [])
          .map((employee) => String(employee?.name || "").trim())
          .filter(Boolean);
        return Array.from(new Set([currentName, ...names, ...MODULE_OWNER_TASKS.map((item) => item.owner)])).filter(Boolean);
      };

      function usernameForName(name) {
        const targetName = String(name || "").trim();
        if (!targetName) return "";
        const employee = (Array.isArray(window.JRC_EMPLOYEES) ? window.JRC_EMPLOYEES : [])
          .find((item) => String(item?.name || "").trim() === targetName);
        return employee?.username || MODULE_OWNER_TASKS.find((item) => item.owner === targetName)?.ownerUsername || "";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function ownerOptions(selected = "") {
        const current = String(selected || "").trim();
        const names = assignableNames();
        if (current && !names.includes(current)) names.unshift(current);
        return [`<option value="">未分配</option>`, ...names.map((name) => `<option value="${escapeHtml(name)}" ${name === current ? "selected" : ""}>${escapeHtml(name)}</option>`)].join("");
      }

      function defaultSuggestions() {
        return [];
      }

      function withoutSampleSuggestions(rows) {
        return rows.filter((item) => !sampleSuggestionIds.has(String(item.id || "")));
      }

      function normalizeSuggestionRows(rows) {
        return withoutSampleSuggestions((Array.isArray(rows) ? rows : []).map(normalizeSuggestion));
      }

      function normalizeSuggestion(item) {
        const normalized = { ...item };
        const oldDecision = "进入" + "资产与采购" + "系统候选需求。";
        if (normalized.decision === oldDecision) {
          normalized.decision = "转入校区运营系统的设备记录处理。";
        }
        if (["triage", "approved"].includes(normalized.status)) normalized.status = "new";
        if (normalized.status === "review") normalized.status = "launched";
        if (!normalized.taskId && ["assigned", "doing", "review", "launched"].includes(normalized.status)) {
          normalized.taskId = `task-${normalized.id || Date.now()}`;
        }
        normalized.entryType = normalized.entryType || (normalized.taskId ? "task" : "suggestion");
        normalized.verifier = normalized.verifier || "";
        normalized.taskStandard = normalized.taskStandard || "";
        normalized.subtasks = normalized.subtasks || "";
        normalized.completionReport = normalized.completionReport || "";
        normalized.rewardLevel = normalized.rewardLevel || "none";
        normalized.rewardAmount = normalized.rewardAmount || "";
        normalized.rewardReason = normalized.rewardReason || "";
        normalized.rewardStatus = normalized.rewardStatus || "none";
        normalized.votedBy = Array.isArray(normalized.votedBy) ? normalized.votedBy : [];
        normalized.ownerUsername = normalized.ownerUsername || "";
        normalized.moduleOwnerTask = Boolean(normalized.moduleOwnerTask);
        normalized.moduleKey = normalized.moduleKey || "";
        normalized.moduleHref = normalized.moduleHref || "";
        return normalized;
      }

      function readRowsFromStorage(key, fallback = []) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || "null");
          return Array.isArray(parsed) ? parsed : fallback;
        } catch (error) {
          console.warn(`Failed to read ${key}`, error);
          return fallback;
        }
      }

      function normalizeDeletedSuggestionIds(rows) {
        return Array.from(new Set((Array.isArray(rows) ? rows : [])
          .map((item) => typeof item === "string" ? item : item?.id)
          .map((id) => String(id || "").trim())
          .filter(Boolean)));
      }

      function readDeletedSuggestionIds() {
        try {
          return new Set(normalizeDeletedSuggestionIds(JSON.parse(localStorage.getItem(DELETED_STORAGE_KEY) || "[]")));
        } catch (error) {
          console.warn("Failed to read deleted suggestions", error);
          return new Set();
        }
      }

      function persistDeletedSuggestionIds(ids) {
        const rows = normalizeDeletedSuggestionIds([...ids]);
        localStorage.setItem(DELETED_STORAGE_KEY, JSON.stringify(rows));
        window.JRC_CLOUD?.writeModuleData?.(DELETED_STORAGE_KEY, "suggestions", rows, { replaceMode: "replace" }).catch((error) => {
          console.warn("Failed to sync deleted suggestions to cloud", error);
        });
        return new Set(rows);
      }

      async function hydrateDeletedSuggestionIds() {
        const localIds = readDeletedSuggestionIds();
        if (!window.JRC_CLOUD?.readModuleData) return localIds;
        try {
          const result = await window.JRC_CLOUD.readModuleData(DELETED_STORAGE_KEY);
          const cloudIds = result?.ok && Array.isArray(result.data?.payload)
            ? normalizeDeletedSuggestionIds(result.data.payload)
            : [];
          const merged = new Set([...localIds, ...cloudIds]);
          if (merged.size !== localIds.size || cloudIds.length !== merged.size) return persistDeletedSuggestionIds(merged);
          return merged;
        } catch (error) {
          console.warn("Failed to hydrate deleted suggestions", error);
          return localIds;
        }
      }

      function markSuggestionDeleted(id) {
        const deletedIds = readDeletedSuggestionIds();
        deletedIds.add(String(id || "").trim());
        return persistDeletedSuggestionIds(deletedIds);
      }

      function readSuggestions() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (Array.isArray(parsed)) {
            const normalized = mergeSuggestionsById(parsed, readDeletedSuggestionIds());
            if (JSON.stringify(normalized) !== JSON.stringify(parsed)) {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
            }
            return normalized;
          }
        } catch (error) {
          console.warn("Failed to read suggestions", error);
        }
        return defaultSuggestions();
      }

      function mergeSuggestionsById(rows, deletedIds = readDeletedSuggestionIds()) {
        const map = new Map();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          if (!row || typeof row !== "object") return;
          const normalized = normalizeSuggestion(row);
          const id = String(normalized.id || "").trim();
          if (!id || deletedIds.has(id)) return;
          const existing = map.get(id) || {};
          map.set(id, { ...existing, ...normalized, id });
        });
        return withoutSampleSuggestions([...map.values()]).sort((left, right) => {
          const rightDate = String(right.createdAt || right.updatedAt || "");
          const leftDate = String(left.createdAt || left.updatedAt || "");
          return rightDate.localeCompare(leftDate);
        });
      }

      function writeSuggestions(options = {}) {
        suggestions = mergeSuggestionsById(suggestions);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
        if (options.replaceMode && !suggestionsCloudHydrated && window.JRC_CLOUD?.readModuleData) {
          console.warn("Skipped cloud replace before suggestions were hydrated from cloud.");
          return;
        }
        const context = options.replaceMode ? { replaceMode: options.replaceMode } : {};
        window.JRC_CLOUD?.writeModuleData?.(STORAGE_KEY, "suggestions", suggestions, context).catch((error) => {
          console.warn("Failed to sync suggestions to cloud", error);
        });
      }

      function buildModuleOwnerTask(task) {
        const date = "2026-06-26";
        return {
          id: `module-owner-${task.key}`,
          entryType: "task",
          title: `【模块负责人】${task.system}试用监管`,
          category: "技术工具",
          impact: "high",
          content: `责任人：${task.owner}\n负责模块：${task.system}\n\n${task.guide}\n\n试用闭环：发现问题请直接点右下角“反馈问题”；管理员处理后，你要在“我的反馈问题”里复核，已解决就确认，没解决就继续补充反馈。`,
          author: "系统分派",
          anonymous: false,
          createdAt: date,
          status: "assigned",
          owner: task.owner,
          ownerUsername: task.ownerUsername || "",
          dueDate: "",
          verifier: "程志豪",
          taskId: `task-module-owner-${task.key}`,
          taskStandard: `把${task.system}试到“老师能理解、能操作、能发现问题、能闭环整改”的程度。`,
          subtasks: [
            `1. 先按使用逻辑完整走一遍${task.system}。`,
            "2. 记录看不懂、不顺手、数据不对、手机/iPad不好点的地方。",
            "3. 把问题通过右下角“反馈问题”提交，不要只在群里口头说。",
            "4. 管理员处理后，在“我的反馈问题”里复核是否真的解决。",
            "5. 仍有问题就继续反馈，直到模块能稳定落地。"
          ].join("\n"),
          completionReport: "",
          rewardLevel: "none",
          rewardAmount: "",
          rewardReason: "",
          rewardStatus: "none",
          votes: 0,
          liked: false,
          decision: `${task.owner}负责${task.system}试用监管、问题整理和整改复核。`,
          comments: [{ author: "系统", text: "模块负责人任务已自动分派。", time: date }],
          moduleOwnerTask: true,
          moduleKey: task.key,
          moduleHref: task.href
        };
      }

      function ensureModuleOwnerTasks() {
        let changed = false;
        const existing = new Map(suggestions.map((item) => [String(item.id || ""), item]));
        MODULE_OWNER_TASKS.forEach((task) => {
          const seed = buildModuleOwnerTask(task);
          const current = existing.get(seed.id);
          if (!current) {
            suggestions.unshift(seed);
            changed = true;
            return;
          }
          const merged = {
            ...current,
            title: seed.title,
            category: seed.category,
            impact: seed.impact,
            content: seed.content,
            owner: seed.owner,
            ownerUsername: seed.ownerUsername,
            verifier: seed.verifier,
            taskId: current.taskId || seed.taskId,
            taskStandard: seed.taskStandard,
            subtasks: seed.subtasks,
            decision: seed.decision,
            moduleOwnerTask: true,
            moduleKey: seed.moduleKey,
            moduleHref: seed.moduleHref,
            entryType: "task"
          };
          if (JSON.stringify(merged) !== JSON.stringify(current)) {
            Object.assign(current, merged);
            changed = true;
          }
        });
        if (changed) writeSuggestions({ replaceMode: "replace" });
        return changed;
      }

      async function hydrateCloudSuggestions() {
        suggestionsCloudHydrated = false;
        const deletedIds = await hydrateDeletedSuggestionIds();
        if (!window.JRC_CLOUD?.readModuleData) {
          suggestions = mergeSuggestionsById(suggestions, deletedIds);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
          suggestionsCloudHydrated = true;
          return;
        }
        try {
          const result = await window.JRC_CLOUD.readModuleData(STORAGE_KEY);
          if (!result?.ok) return;
          const localSuggestions = mergeSuggestionsById(suggestions, deletedIds);
          if (!result.data?.found) {
            suggestions = localSuggestions;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
            suggestionsCloudHydrated = true;
            if (suggestions.length) {
              window.JRC_CLOUD.writeModuleData(STORAGE_KEY, "suggestions", suggestions).catch((error) => {
                console.warn("Failed to seed suggestions to cloud", error);
              });
            }
            return;
          }
          if (!Array.isArray(result.data.payload)) return;
          const cloudSuggestions = mergeSuggestionsById(result.data.payload, deletedIds);
          suggestions = mergeSuggestionsById([...cloudSuggestions, ...localSuggestions], deletedIds);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
          suggestionsCloudHydrated = true;
          const cloudHadDeletedRows = result.data.payload.length !== cloudSuggestions.length;
          const cloudChanged =
            JSON.stringify(suggestions) !== JSON.stringify(cloudSuggestions) ||
            JSON.stringify(localSuggestions) !== JSON.stringify(suggestions) ||
            cloudHadDeletedRows;
          if (cloudChanged) {
            window.JRC_CLOUD.writeModuleData(STORAGE_KEY, "suggestions", suggestions, { replaceMode: "replace" }).catch((error) => {
              console.warn("Failed to merge suggestions to cloud", error);
            });
          }
        } catch (error) {
          console.warn("Failed to hydrate suggestions from cloud", error);
        }
      }

      let suggestions = readSuggestions();
      let suggestionsCloudHydrated = false;
      let siteFeedbackRows = readRowsFromStorage(FEEDBACK_STORAGE_KEY, []);
      let pendingAssignment = null;
      let activeManagementId = "";

      function personMatchesNameOrUsername(row) {
        const name = String(currentName || "").trim();
        const username = String(currentUsername || "").trim().toLowerCase();
        const rowNames = [row.userName, row.name, row.author, row.owner]
          .map((value) => String(value || "").trim())
          .filter(Boolean);
        const rowUsernames = [row.username, row.ownerUsername, row.authorUsername]
          .map((value) => String(value || "").trim().toLowerCase())
          .filter(Boolean);
        return Boolean((name && rowNames.includes(name)) || (username && rowUsernames.includes(username)));
      }

      function normalizeFeedback(row) {
        const normalized = { ...(row || {}) };
        const type = String(normalized.type || "试用反馈");
        normalized.id = String(normalized.id || "").trim() || `FB-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
        normalized.userName = normalized.userName || normalized.name || "未登录";
        normalized.username = normalized.username || "";
        normalized.role = normalized.role || "";
        normalized.system = normalized.system || normalized.pageTitle || "未知页面";
        normalized.type = type;
        normalized.status = normalized.status || "待处理";
        normalized.severity = normalized.severity || (["数据不对", "按钮点不开"].includes(type) ? "紧急" : "普通");
        normalized.content = normalized.content || normalized.description || "";
        normalized.url = normalized.url || "";
        normalized.createdAt = normalized.createdAt || new Date().toISOString();
        normalized.feedbackCategory = normalized.feedbackCategory || (type === "功能建议" ? "功能建议" : type === "数据不对" ? "数据错误" : type === "手机显示问题" ? "手机端问题" : "使用问题");
        normalized.reviewNotes = Array.isArray(normalized.reviewNotes) ? normalized.reviewNotes : [];
        normalized.owner = normalized.owner || "";
        normalized.taskId = normalized.taskId || "";
        normalized.processedBy = normalized.processedBy || "";
        normalized.processedAt = normalized.processedAt || "";
        normalized.resolution = normalized.resolution || "";
        return normalized;
      }

      function mergeById(rows) {
        const map = new Map();
        rows.forEach((row) => {
          if (!row || typeof row !== "object") return;
          const normalized = normalizeFeedback(row);
          const id = String(normalized.id || "").trim();
          const existing = map.get(id) || {};
          map.set(id, { ...existing, ...normalized, id });
        });
        return [...map.values()]
          .sort((left, right) => String(right.createdAt || "").localeCompare(String(left.createdAt || "")))
          .slice(0, 300);
      }

      function writeSiteFeedbackRows() {
        siteFeedbackRows = mergeById(siteFeedbackRows);
        localStorage.setItem(FEEDBACK_STORAGE_KEY, JSON.stringify(siteFeedbackRows));
        window.JRC_CLOUD?.writeModuleData?.(FEEDBACK_STORAGE_KEY, "siteFeedback", siteFeedbackRows).catch((error) => {
          console.warn("Failed to sync site feedback to cloud", error);
        });
      }

      async function hydrateSiteFeedback() {
        if (!window.JRC_CLOUD?.readModuleData) return;
        try {
          const result = await window.JRC_CLOUD.readModuleData(FEEDBACK_STORAGE_KEY);
          if (!result?.ok || !Array.isArray(result.data?.payload)) return;
          siteFeedbackRows = mergeById([...siteFeedbackRows, ...result.data.payload]);
          localStorage.setItem(FEEDBACK_STORAGE_KEY, JSON.stringify(siteFeedbackRows));
        } catch (error) {
          console.warn("Failed to hydrate site feedback from cloud", error);
        }
      }

      function isDueSoon(item) {
        if (!item.dueDate || completedStatuses.has(item.status) || item.status === "paused") return false;
        const due = new Date(item.dueDate + "T00:00:00");
        const now = new Date(today() + "T00:00:00");
        const diffDays = Math.ceil((due - now) / 86400000);
        return diffDays <= 3;
      }

      function isOverdue(item) {
        if (!item.dueDate || completedStatuses.has(item.status) || item.status === "paused") return false;
        const due = new Date(item.dueDate + "T00:00:00");
        const now = new Date(today() + "T00:00:00");
        return due < now;
      }

      function isOpenTask(item) {
        return ["assigned", "doing"].includes(item.status);
      }

      function matchesTaskView(item, view) {
        if (!view) return true;
        const mineByName = [item.owner, item.author].some((value) => String(value || "") === currentName);
        const mineByUsername = [item.ownerUsername, item.authorUsername].some((value) => String(value || "").toLowerCase() === String(currentUsername || "").toLowerCase());
        if (view === "my") return mineByName || mineByUsername;
        if (view === "owner") return String(item.owner || "") === currentName || String(item.ownerUsername || "").toLowerCase() === String(currentUsername || "").toLowerCase();
        if (view === "author") return String(item.author || "") === currentName || String(item.authorUsername || "").toLowerCase() === String(currentUsername || "").toLowerCase();
        if (view === "open") return isOpenTask(item);
        if (view === "overdue") return isOverdue(item);
        return true;
      }

      function filteredSuggestions() {
        const keyword = byId("searchInput").value.trim().toLowerCase();
        const status = byId("statusFilter").value;
        const category = byId("categoryFilter").value;
        const taskView = byId("taskViewFilter").value;
        return suggestions.filter((item) => {
          const haystack = [item.title, item.content, item.owner, item.author, item.category].join(" ").toLowerCase();
          return (!keyword || haystack.includes(keyword)) &&
            (!status || item.status === status) &&
            (!category || item.category === category) &&
            matchesTaskView(item, taskView);
        }).sort((left, right) => {
          const voteDiff = Number(right.votes || 0) - Number(left.votes || 0);
          if (voteDiff !== 0) return voteDiff;
          if (isOverdue(left) !== isOverdue(right)) return isOverdue(left) ? -1 : 1;
          const rightDate = String(right.updatedAt || right.createdAt || "");
          const leftDate = String(left.updatedAt || left.createdAt || "");
          return rightDate.localeCompare(leftDate);
        });
      }

      function renderStats() {
        byId("statTotal").textContent = suggestions.length;
        byId("statNew").textContent = suggestions.filter((item) => item.status === "new").length;
        byId("statTask").textContent = suggestions.filter((item) => item.status === "assigned").length;
        byId("statReview").textContent = suggestions.filter((item) => item.status === "doing").length;
        byId("statLaunched").textContent = suggestions.filter((item) => completedStatuses.has(item.status)).length;
        byId("statReward").textContent = suggestions.reduce((sum, item) => sum + Number(item.votes || 0), 0);
      }

      function renderSiteFeedback() {
        const section = byId("siteFeedbackSection");
        const list = byId("siteFeedbackList");
        if (!section || !list) return;
        section.hidden = false;
        const keyword = String(byId("siteFeedbackSearch")?.value || "").trim().toLowerCase();
        const statusFilter = String(byId("siteFeedbackStatusFilter")?.value || "");
        const severityFilter = String(byId("siteFeedbackSeverityFilter")?.value || "");
        const summaryNode = byId("siteFeedbackSummary");
        const ranksNode = byId("siteFeedbackRanks");
        const feedbackTitle = byId("siteFeedbackTitle");
        const visibleBaseRows = canManage ? siteFeedbackRows : siteFeedbackRows.filter(personMatchesNameOrUsername);
        const closedStatuses = ["已处理", "已转任务", "已确认解决"];
        if (feedbackTitle) feedbackTitle.textContent = canManage ? "全站反馈问题" : "我的反馈问题";
        const exportButton = byId("exportFeedbackButton");
        if (exportButton) exportButton.hidden = !canManage;
        const pendingRows = visibleBaseRows.filter((row) => !closedStatuses.includes(row.status));
        const processedRows = visibleBaseRows.filter((row) => closedStatuses.includes(row.status));
        const taskRows = visibleBaseRows.filter((row) => row.status === "已转任务");
        const reopenedRows = visibleBaseRows.filter((row) => row.status === "继续反馈");
        const urgentRows = visibleBaseRows.filter((row) => row.severity === "紧急" && !closedStatuses.includes(row.status));
        const teacherNames = new Set(visibleBaseRows.map((row) => row.userName || "未登录"));
        const systemNames = new Set(visibleBaseRows.map((row) => row.system || "未知页面"));
        const countBy = (field) => {
          const map = new Map();
          visibleBaseRows.forEach((row) => {
            const key = String(row[field] || (field === "userName" ? "未登录" : "未知页面"));
            map.set(key, (map.get(key) || 0) + 1);
          });
          return [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
        };
        if (summaryNode) {
          const summaryRows = canManage ? [
            ["试用反馈", visibleBaseRows.length],
            ["已处理", processedRows.length],
            ["待处理", pendingRows.length],
            ["紧急", urgentRows.length],
            ["参与老师", teacherNames.size],
            ["涉及系统", systemNames.size]
          ] : [
            ["我共提反馈", visibleBaseRows.length],
            ["已处理", processedRows.length],
            ["待处理", pendingRows.length],
            ["继续反馈", reopenedRows.length],
            ["已转任务", taskRows.length],
            ["涉及系统", systemNames.size]
          ];
          summaryNode.innerHTML = summaryRows.map(([label, value]) => `
            <div class="feedback-summary-card"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>
          `).join("");
        }
        if (ranksNode) {
          ranksNode.hidden = !canManage;
          const teacherRows = countBy("userName");
          const systemRows = countBy("system");
          const renderRank = (title, rows) => `
            <div class="feedback-card">
              <h3>${escapeHtml(title)}</h3>
              <div class="comment-list">
                ${rows.length ? rows.map(([name, count]) => `
                  <div class="comment-item"><strong>${escapeHtml(name)}：</strong>${count} 条</div>
                `).join("") : `<div class="empty">暂无</div>`}
              </div>
            </div>
          `;
          ranksNode.innerHTML = renderRank("试用贡献记录", teacherRows) + renderRank("系统反馈分布", systemRows);
        }
        const rows = [...visibleBaseRows]
          .filter((row) => {
            const status = row.status || "待处理";
            const haystack = [row.userName, row.username, row.role, row.system, row.type, row.content, row.url, row.resolution]
              .join(" ")
              .toLowerCase();
            return (!statusFilter || status === statusFilter) && (!keyword || haystack.includes(keyword));
          })
          .filter((row) => !severityFilter || row.severity === severityFilter)
          .sort((left, right) => {
            const leftDone = closedStatuses.includes(left.status);
            const rightDone = closedStatuses.includes(right.status);
            if (leftDone !== rightDone) return leftDone ? 1 : -1;
            if (left.severity !== right.severity) return left.severity === "紧急" ? -1 : right.severity === "紧急" ? 1 : 0;
            return String(right.createdAt || "").localeCompare(String(left.createdAt || ""));
          })
          .slice(0, 40);
        if (!rows.length) {
          list.innerHTML = `<div class="empty">${canManage ? "暂无符合条件的反馈。" : "你还没有提交过反馈；在任意模块右下角点“反馈问题”即可提交。"}</div>`;
          return;
        }
        list.innerHTML = rows.map((row) => {
          const mine = personMatchesNameOrUsername(row);
          const done = closedStatuses.includes(row.status);
          const canVerify = mine && ["已处理", "已转任务"].includes(row.status || "");
          const reviewNotes = Array.isArray(row.reviewNotes) ? row.reviewNotes : [];
          return `
            <article class="feedback-card ${done ? "is-done" : ""} ${mine ? "is-mine" : ""}" data-feedback-id="${escapeHtml(row.id)}">
              <div class="suggestion-head">
                <div>
                  <div class="suggestion-title">${escapeHtml(row.type || "试用反馈")}</div>
                  <div class="feedback-meta">
                    ${escapeHtml(row.userName || "未登录")}｜${escapeHtml(row.system || "未知页面")}
                    ｜${escapeHtml(row.feedbackCategory || "使用问题")}｜${escapeHtml(row.severity || "普通")}
                    <br>${escapeHtml((row.createdAt || "").replace("T", " ").slice(0, 19))}
                  </div>
                </div>
                <span class="status-pill ${done ? "launched" : "new"}">${escapeHtml(row.status || "待处理")}</span>
              </div>
              <p class="feedback-content">${escapeHtml(row.content || "")}</p>
              ${row.resolution ? `<div class="comment-item"><strong>处理结果：</strong>${escapeHtml(row.resolution)}</div>` : ""}
              ${reviewNotes.length ? `<details class="comment-details"><summary>复核记录 ${reviewNotes.length}</summary><div class="comment-list">${reviewNotes.map((note) => `<div class="comment-item"><strong>${escapeHtml(note.author || "反馈人")}：</strong>${escapeHtml(note.text || "")} <span class="muted">${escapeHtml(note.time || "")}</span></div>`).join("")}</div></details>` : ""}
              <div class="card-tools">
                <a class="button secondary" href="${escapeHtml(row.url || "#")}" target="_blank" rel="noreferrer">打开页面</a>
                ${canManage && !done ? `<button class="button" type="button" data-feedback-action="task">转为任务</button>` : ""}
                ${canManage && !["已处理", "已确认解决"].includes(row.status || "") ? `<button class="button secondary" type="button" data-feedback-action="done">标记已处理</button>` : ""}
                ${canVerify ? `<button class="button" type="button" data-feedback-action="confirm">确认已解决</button>` : ""}
                ${canVerify ? `<button class="button secondary" type="button" data-feedback-action="reopen">仍有问题</button>` : ""}
              </div>
            </article>
          `;
        }).join("");
      }

      function renderPipeline() {
        byId("pipelineBoard").innerHTML = statusOrder.map((status) => {
          const items = suggestions.filter((item) => item.status === status).slice(0, 4);
          return `
            <section class="pipeline-column">
              <h3>${statusMap[status]} <span>${suggestions.filter((item) => item.status === status).length}</span></h3>
              ${items.length ? items.map((item) => `
                <div class="pipeline-item">
                  <strong>${escapeHtml(item.title)}</strong>
                  <span>${escapeHtml(item.owner || "未分配")}｜${escapeHtml(item.dueDate || "无截止")}</span>
                </div>
              `).join("") : `<div class="empty">暂无</div>`}
            </section>
          `;
        }).join("");
      }

      function renderList() {
        const list = filteredSuggestions();
        byId("suggestionList").innerHTML = list.length ? list.map((item) => {
          const authorLabel = item.anonymous ? "匿名" : item.author || "未记录";
          const noteCount = (item.comments || []).length + (item.decision ? 1 : 0) + (item.completionReport ? 1 : 0);
          const managerOpen = canManage && activeManagementId === item.id;
          const contentHtml = item.moduleOwnerTask
            ? `<div class="module-guide">${escapeHtml(item.content)}</div>`
            : `<p class="suggestion-content"><strong>建议内容：</strong>${escapeHtml(item.content)}</p>`;
          return `
          <article class="suggestion-card ${isOverdue(item) ? "overdue" : ""}" data-id="${escapeHtml(item.id)}">
            <div class="suggestion-head">
              <div>
                <div class="suggestion-title">${escapeHtml(item.title)}</div>
                <div class="suggestion-meta">
                  <strong>建议人：</strong>${escapeHtml(authorLabel)}｜${escapeHtml(item.category)}｜${escapeHtml(item.createdAt)}
                  ${item.entryType === "task" ? "｜直接任务" : "｜建议"}
                  ${item.owner ? `｜负责人 ${escapeHtml(item.owner)}` : "｜未分配负责人"}
                  ${item.dueDate ? `｜截止 ${escapeHtml(item.dueDate)}` : ""}
                </div>
              </div>
              <div class="card-tools">
                <span class="status-pill ${escapeHtml(item.status)}">${escapeHtml(statusMap[item.status] || item.status)}</span>
                ${isOverdue(item) ? `<span class="status-pill reward">已逾期</span>` : ""}
                <span class="priority-pill ${escapeHtml(item.impact)}">${escapeHtml(impactMap[item.impact] || "中影响")}</span>
              </div>
            </div>
            ${contentHtml}
            ${item.moduleOwnerTask && item.moduleHref ? `<div class="module-owner-link"><a class="button secondary" href="${escapeHtml(item.moduleHref)}">进入负责模块</a></div>` : ""}
            <div class="card-tools">
              <button class="button secondary" type="button" data-action="vote">${(item.votedBy || []).includes(currentUsername) ? "已支持" : "支持"} ${Number(item.votes || 0)}</button>
              <button class="button secondary" type="button" data-action="comment">添加跟进</button>
              ${["assigned", "doing"].includes(item.status) ? `<button class="button secondary" type="button" data-action="complete-report">提交完成反馈</button>` : ""}
              ${canManage && item.status === "new" ? `<button class="button" type="button" data-action="convert-task">派任务</button>` : ""}
              ${canManage ? `<button class="button secondary" type="button" data-action="toggle-management">${managerOpen ? "收起处理" : "处理设置"}</button>` : ""}
              ${canManage ? `<button class="button danger" type="button" data-action="delete">删除</button>` : ""}
            </div>
            ${noteCount ? `
              <details class="comment-details">
                <summary>跟进记录 ${noteCount}</summary>
                <div class="comment-list">
                  ${item.completionReport ? `<div class="comment-item"><strong>完成反馈：</strong>${escapeHtml(item.completionReport)}</div>` : ""}
                  ${item.decision ? `<div class="comment-item"><strong>处理说明：</strong>${escapeHtml(item.decision)}</div>` : ""}
                  ${(item.comments || []).map((comment) => `
                    <div class="comment-item"><strong>${escapeHtml(comment.author)}：</strong>${escapeHtml(comment.text)} <span class="muted">${escapeHtml(comment.time || "")}</span></div>
                  `).join("")}
                </div>
              </details>
            ` : ""}
            ${managerOpen ? `
              <div class="manager-panel">
                <label class="field">
                  状态
                  <select data-manager-field="status">
                    ${Object.entries(statusMap).map(([value, label]) => `<option value="${value}" ${item.status === value ? "selected" : ""}>${label}</option>`).join("")}
                  </select>
                </label>
                <label class="field">
                  负责人
                  <select data-manager-field="owner">${ownerOptions(item.owner)}</select>
                </label>
                <label class="field">
                  截止日期
                  <input data-manager-field="dueDate" type="date" value="${escapeHtml(item.dueDate || "")}">
                </label>
                <label class="field span-2">
                  处理说明
                  <textarea data-manager-field="decision">${escapeHtml(item.decision || "")}</textarea>
                </label>
                <div class="actions">
                  <button class="button" type="button" data-action="save-management">保存处理</button>
                </div>
              </div>
            ` : ""}
          </article>
        `;
        }).join("") : `<div class="empty">没有符合筛选条件的建议。</div>`;
      }

      function renderAll() {
        renderStats();
        renderPipeline();
        renderList();
        renderSiteFeedback();
      }

      function applyFormPermission() {
        document.querySelectorAll("[data-manager-only-field]").forEach((node) => {
          node.hidden = !canManage;
          const select = node.querySelector("select");
          if (select && !canManage) select.value = "suggestion";
        });
        const ownerSelect = byId("ownerSelect");
        if (ownerSelect) ownerSelect.innerHTML = ownerOptions("");
      }

      function addSuggestion() {
        const form = byId("suggestionForm");
        const data = new FormData(form);
        const title = String(data.get("title") || "").trim();
        const content = String(data.get("content") || "").trim();
        if (!title || !content) return;
        const entryType = String(data.get("entryType") || "suggestion");
        if (entryType === "task" && !canManage) {
          alert("直接新增任务需要建议系统管理权限。普通员工可以先提交建议。");
          return;
        }
        const anonymous = data.get("anonymous") === "on";
        const owner = String(data.get("owner") || "").trim();
        const isDirectTask = entryType === "task";
        if (isDirectTask && !owner) {
          alert("直接新增任务请先选择负责人。");
          return;
        }
        suggestions.unshift({
          id: `${isDirectTask ? "t" : "s"}-${Date.now()}`,
          entryType,
          title,
          category: String(data.get("category") || "流程优化"),
          impact: String(data.get("impact") || "medium"),
          content,
          author: anonymous ? "匿名" : currentName,
          authorUsername: anonymous ? "" : currentUsername,
          anonymous,
          createdAt: today(),
          status: isDirectTask ? "assigned" : "new",
          owner,
          ownerUsername: usernameForName(owner),
          dueDate: String(data.get("dueDate") || "").trim(),
          verifier: "",
          taskId: isDirectTask ? `task-${Date.now()}` : "",
          taskStandard: "",
          subtasks: "",
          completionReport: "",
          rewardLevel: "none",
          rewardAmount: "",
          rewardReason: "",
          rewardStatus: "none",
          votes: 0,
          liked: false,
          decision: "",
          comments: []
        });
        writeSuggestions();
        form.reset();
        renderAll();
      }

      function findCardSuggestion(target) {
        const card = target.closest("[data-id]");
        if (!card) return null;
        return suggestions.find((item) => item.id === card.getAttribute("data-id"));
      }

      function saveManagement(button) {
        const card = button.closest("[data-id]");
        const item = findCardSuggestion(button);
        if (!item || !card) return;
        card.querySelectorAll("[data-manager-field]").forEach((field) => {
          item[field.getAttribute("data-manager-field")] = field.value;
        });
        if (!item.owner && item.status !== "new") item.owner = currentName;
        item.ownerUsername = usernameForName(item.owner);
        if (["assigned", "doing", "review", "launched"].includes(item.status) && !item.taskId) {
          item.taskId = `task-${Date.now()}`;
        }
        item.updatedAt = new Date().toISOString();
        activeManagementId = "";
        writeSuggestions();
        renderAll();
      }

      function assignSuggestionItem(item, owner, dueDate = "") {
        if (!owner || !owner.trim()) {
          alert("请先选择或填写负责人，再派任务。");
          return false;
        }
        item.status = "assigned";
        item.taskId = item.taskId || `task-${Date.now()}`;
        item.owner = owner.trim();
        item.ownerUsername = usernameForName(item.owner);
        if (dueDate) item.dueDate = dueDate;
        item.decision = item.decision || `已派给 ${item.owner} 执行。`;
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: `已派任务给 ${item.owner}。`, time: today() });
        return true;
      }

      function openAssignModal(target) {
        pendingAssignment = target;
        const modal = byId("assignTaskModal");
        const ownerSelect = byId("assignTaskOwnerSelect");
        const dueInput = byId("assignTaskDueInput");
        if (!modal || !ownerSelect || !dueInput) return;
        const existingOwner = target?.item?.owner || target?.feedback?.owner || "";
        ownerSelect.innerHTML = ownerOptions(existingOwner);
        dueInput.value = target?.item?.dueDate || (target?.feedback ? today() : "");
        byId("assignTaskTitle").textContent = target?.feedback ? "选择反馈处理人" : "选择任务负责人";
        modal.hidden = false;
      }

      function closeAssignModal() {
        pendingAssignment = null;
        const modal = byId("assignTaskModal");
        if (modal) modal.hidden = true;
      }

      function confirmAssignment() {
        const owner = byId("assignTaskOwnerSelect")?.value || "";
        const dueDate = byId("assignTaskDueInput")?.value || "";
        if (!pendingAssignment) return;
        if (pendingAssignment.item) {
          if (!assignSuggestionItem(pendingAssignment.item, owner, dueDate)) return;
        }
        if (pendingAssignment.feedback) {
          if (!convertFeedbackToTask(pendingAssignment.feedback, owner, dueDate)) return;
        }
        closeAssignModal();
        writeSuggestions();
        renderAll();
      }

      function convertToTask(item) {
        openAssignModal({ item });
      }

      function findFeedback(target) {
        const card = target.closest("[data-feedback-id]");
        if (!card) return null;
        return siteFeedbackRows.find((row) => row.id === card.getAttribute("data-feedback-id"));
      }

      function convertFeedbackToTask(feedback, owner, dueDate = "") {
        if (!feedback) return;
        const createdDate = today();
        const highImpact = feedback.severity === "紧急" || ["数据不对", "按钮点不开"].includes(feedback.type);
        if (!owner || !owner.trim()) {
          alert("请先选择或填写负责人，再转为任务。");
          return false;
        }
        suggestions.unshift({
          id: `t-feedback-${Date.now()}`,
          entryType: "task",
          title: `处理反馈：${feedback.type || "试用问题"}`,
          category: "技术工具",
          impact: highImpact ? "high" : "medium",
          content: `${feedback.content || ""}\n\n严重程度：${feedback.severity || "普通"}\n问题分类：${feedback.feedbackCategory || "使用问题"}\n来源页面：${feedback.system || "-"}\n反馈人：${feedback.userName || "未登录"}\n页面链接：${feedback.url || "-"}`,
          author: feedback.userName || "系统反馈",
          authorUsername: feedback.username || "",
          anonymous: false,
          createdAt: createdDate,
          status: "assigned",
          owner: owner.trim(),
          ownerUsername: usernameForName(owner),
          dueDate: dueDate || createdDate,
          verifier: "",
          taskId: `task-feedback-${Date.now()}`,
          taskStandard: "",
          subtasks: "",
          completionReport: "",
          rewardLevel: "none",
          rewardAmount: "",
          rewardReason: "",
          rewardStatus: "none",
          votes: 0,
          liked: false,
          decision: "来自全站反馈，已转为执行任务。",
          sourceFeedbackId: feedback.id,
          comments: [{ author: currentName, text: "全站反馈已转为任务。", time: createdDate }]
        });
        feedback.status = "已转任务";
        feedback.taskId = suggestions[0].taskId;
        feedback.owner = owner.trim();
        feedback.ownerUsername = usernameForName(owner);
        feedback.resolution = `已转为任务，负责人：${owner.trim()}。请提交人后续在“我的反馈问题”里复核处理效果。`;
        feedback.processedAt = new Date().toISOString();
        feedback.processedBy = currentName;
        feedback.reviewNotes = Array.isArray(feedback.reviewNotes) ? feedback.reviewNotes : [];
        feedback.reviewNotes.push({ author: currentName, text: feedback.resolution, time: today() });
        writeSiteFeedbackRows();
        return true;
      }

      function submitCompletion(item) {
        const text = prompt("填写完成反馈：做了什么、结果如何、还缺什么");
        if (!text || !text.trim()) return;
        item.completionReport = text.trim();
        item.status = "launched";
        item.completedAt = new Date().toISOString();
        item.completedBy = currentName;
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: `完成反馈：${text.trim()}`, time: today() });
        writeSuggestions();
        renderAll();
      }

      function addComment(item) {
        const text = prompt("填写跟进记录或补充说明");
        if (!text || !text.trim()) return;
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: text.trim(), time: today() });
        writeSuggestions();
        renderAll();
      }

      function exportCsv() {
        const rows = [
          ["标题", "分类", "紧急程度", "状态", "提交人", "负责人", "截止日期", "支持数", "完成反馈", "内容", "处理说明"],
          ...suggestions.map((item) => [
            item.title,
            item.category,
            impactMap[item.impact] || item.impact,
            statusMap[item.status] || item.status,
            item.author,
            item.owner,
            item.dueDate,
            item.votes,
            item.completionReport,
            item.content,
            item.decision
          ])
        ];
        const csv = rows.map((row) => row.map((cell) => {
          const text = String(cell ?? "");
          return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `建议管理台账-${today()}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportFeedbackCsv() {
        const rows = [
          ["提交时间", "老师", "用户名", "角色", "系统页面", "问题类型", "问题分类", "紧急程度", "状态", "任务编号", "问题说明", "页面链接", "处理人", "处理时间"],
          ...siteFeedbackRows.map((row) => [
            row.createdAt || "",
            row.userName || "",
            row.username || "",
            row.role || "",
            row.system || "",
            row.type || "",
            row.feedbackCategory || "",
            row.severity || "普通",
            row.status || "待处理",
            row.taskId || "",
            row.content || "",
            row.url || "",
            row.processedBy || "",
            row.processedAt || ""
          ])
        ];
        const csv = rows.map((row) => row.map((cell) => {
          const text = String(cell ?? "");
          return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `试用反馈台账-${today()}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      byId("submitSuggestionButton").addEventListener("click", addSuggestion);
      byId("exportSuggestionsButton").addEventListener("click", exportCsv);
      byId("assignTaskConfirmButton")?.addEventListener("click", confirmAssignment);
      byId("assignTaskCancelButton")?.addEventListener("click", closeAssignModal);
      byId("assignTaskModal")?.addEventListener("click", (event) => {
        if (event.target?.id === "assignTaskModal") closeAssignModal();
      });
      byId("exportFeedbackButton")?.addEventListener("click", exportFeedbackCsv);
      byId("siteFeedbackSearch")?.addEventListener("input", renderSiteFeedback);
      byId("siteFeedbackStatusFilter")?.addEventListener("change", renderSiteFeedback);
      byId("siteFeedbackSeverityFilter")?.addEventListener("change", renderSiteFeedback);
      ["searchInput", "statusFilter", "taskViewFilter", "categoryFilter"].forEach((id) => {
        byId(id).addEventListener("input", renderList);
        byId(id).addEventListener("change", renderList);
      });
      byId("suggestionList").addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const item = findCardSuggestion(actionButton);
        if (!item) return;
        const action = actionButton.getAttribute("data-action");
        if (action === "vote") {
          item.votedBy = Array.isArray(item.votedBy) ? item.votedBy : [];
          if (!item.votedBy.includes(currentUsername)) {
            item.votedBy.push(currentUsername);
            item.votes = item.votedBy.length;
          }
        }
        if (action === "comment") addComment(item);
        if (action === "convert-task" && canManage) {
          convertToTask(item);
          return;
        }
        if (action === "complete-report") {
          submitCompletion(item);
          return;
        }
        if (action === "toggle-management" && canManage) {
          activeManagementId = activeManagementId === item.id ? "" : item.id;
          renderAll();
          return;
        }
        if (action === "delete" && canManage) {
          const title = item.title || "这条建议";
          if (!confirm(`确定删除「${title}」吗？删除后刷新页面也不会恢复。`)) return;
          markSuggestionDeleted(item.id);
          suggestions = suggestions.filter((candidate) => candidate.id !== item.id);
          writeSuggestions({ replaceMode: "replace" });
          renderAll();
          return;
        }
        if (action === "save-management" && canManage) {
          saveManagement(actionButton);
          return;
        }
        writeSuggestions();
        renderAll();
      });
      byId("siteFeedbackList")?.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-feedback-action]");
        if (!actionButton) return;
        const feedback = findFeedback(actionButton);
        if (!feedback) return;
        const action = actionButton.getAttribute("data-feedback-action");
        if (action === "task") {
          if (!canManage) return;
          openAssignModal({ feedback });
          return;
        }
        if (action === "done") {
          if (!canManage) return;
          const resolution = prompt("请填写处理结果，提交人会看到这段说明并复核是否真的解决：", feedback.resolution || "");
          if (resolution === null) return;
          feedback.status = "已处理";
          feedback.resolution = String(resolution || "").trim() || "管理员已处理，请提交人复核。";
          feedback.processedAt = new Date().toISOString();
          feedback.processedBy = currentName;
          feedback.reviewNotes = Array.isArray(feedback.reviewNotes) ? feedback.reviewNotes : [];
          feedback.reviewNotes.push({ author: currentName, text: `标记已处理：${feedback.resolution}`, time: today() });
          writeSiteFeedbackRows();
          renderAll();
          return;
        }
        if (action === "confirm") {
          if (!personMatchesNameOrUsername(feedback)) return;
          feedback.status = "已确认解决";
          feedback.confirmedAt = new Date().toISOString();
          feedback.confirmedBy = currentName;
          feedback.reviewNotes = Array.isArray(feedback.reviewNotes) ? feedback.reviewNotes : [];
          feedback.reviewNotes.push({ author: currentName, text: "提交人已确认解决。", time: today() });
          writeSiteFeedbackRows();
          renderAll();
          return;
        }
        if (action === "reopen") {
          if (!personMatchesNameOrUsername(feedback)) return;
          const text = prompt("请补充说明哪里还没解决，或者现在看到的新问题：");
          if (!text || !text.trim()) return;
          feedback.status = "继续反馈";
          feedback.reopenedAt = new Date().toISOString();
          feedback.reviewNotes = Array.isArray(feedback.reviewNotes) ? feedback.reviewNotes : [];
          feedback.reviewNotes.push({ author: currentName, text: `仍有问题：${text.trim()}`, time: today() });
          writeSiteFeedbackRows();
          renderAll();
          return;
        }
      });

      (async () => {
        applyFormPermission();
        await hydrateCloudSuggestions();
        ensureModuleOwnerTasks();
        await hydrateSiteFeedback();
        renderAll();
      })();
    </script>
    <script src="/jrcedu/portal/mobile-unified.js?v=20260623k"></script>
  </body>
</html>
