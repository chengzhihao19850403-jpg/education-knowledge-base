<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>匠人程工作台｜建议与任务协同系统</title>
    <style>
      :root {
        --bg: #f6f3ee;
        --panel: rgba(255, 255, 255, 0.96);
        --ink: #1f2933;
        --muted: #66717c;
        --line: rgba(31, 41, 51, 0.08);
        --brand: #0d9488;
        --brand-dark: #0f766e;
        --orange: #bc582e;
        --blue: #2563eb;
        --red: #b91c1c;
        --shadow: 0 18px 50px rgba(31, 41, 51, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(13, 148, 136, 0.12), transparent 28%),
          radial-gradient(circle at top right, rgba(188, 88, 46, 0.10), transparent 24%),
          linear-gradient(180deg, #faf7f2 0%, #f0e7db 100%);
      }
      button, input, select, textarea { font: inherit; }
      .shell {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }
      .topbar,
      .card,
      .stat-card,
      .pipeline-column {
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.66);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
        padding: 14px 18px;
      }
      .brand-name { font-size: 18px; font-weight: 800; }
      .brand-subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .nav { display: flex; flex-wrap: wrap; gap: 8px; }
      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        color: var(--ink);
        text-decoration: none;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
        font-size: 13px;
      }
      .nav-link.active {
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
        color: #fff;
        border-color: transparent;
      }
      .card { padding: 24px; }
      .card + .card,
      .grid + .card,
      .card + .grid { margin-top: 18px; }
      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
        gap: 18px;
        align-items: stretch;
      }
      .eyebrow {
        margin: 0 0 10px;
        color: var(--brand);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: clamp(30px, 4vw, 42px); line-height: 1.08; }
      h2 { font-size: 22px; }
      h3 { font-size: 17px; }
      p { color: var(--muted); line-height: 1.7; }
      .hero-text { margin-top: 12px; }
      .tag-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }
      .tag,
      .status-pill,
      .priority-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .tag {
        background: rgba(13, 148, 136, 0.10);
        color: var(--brand-dark);
      }
      .tag.orange {
        background: rgba(188, 88, 46, 0.10);
        color: var(--orange);
      }
      .auth-note {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(13, 148, 136, 0.08);
        border: 1px solid rgba(13, 148, 136, 0.16);
        color: var(--muted);
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .stat-card { padding: 18px; }
      .stat-card span { color: var(--muted); font-size: 13px; }
      .stat-card strong {
        display: block;
        margin-top: 8px;
        font-size: 30px;
        line-height: 1;
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(420px, 1.1fr);
        gap: 18px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      label.field {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }
      .field input,
      .field select,
      .field textarea,
      .filters input,
      .filters select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 12px;
        color: var(--ink);
        background: rgba(255,255,255,0.9);
      }
      .field textarea {
        min-height: 104px;
        resize: vertical;
        padding: 10px 12px;
      }
      .span-2 { grid-column: 1 / -1; }
      .check-row {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .check-row input { width: 16px; height: 16px; }
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
        color: #fff;
        cursor: pointer;
        font-weight: 800;
      }
      .button.secondary {
        background: rgba(255,255,255,0.82);
        color: var(--ink);
        border: 1px solid var(--line);
      }
      .button.danger {
        background: rgba(185, 28, 28, 0.1);
        color: var(--red);
      }
      .button:disabled,
      input:disabled,
      select:disabled,
      textarea:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }
      .filters {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 150px 150px 150px;
        gap: 10px;
        margin-top: 16px;
      }
      .suggestion-list {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }
      .suggestion-card {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        background: rgba(255,255,255,0.78);
      }
      .suggestion-card.overdue {
        border-color: rgba(185, 28, 28, 0.28);
        background: rgba(185, 28, 28, 0.045);
      }
      .suggestion-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .suggestion-title {
        font-size: 18px;
        font-weight: 800;
        color: var(--ink);
      }
      .suggestion-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .suggestion-content {
        margin-top: 12px;
        color: var(--ink);
        line-height: 1.75;
      }
      .card-tools {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }
      .status-pill.new { background: rgba(188, 88, 46, 0.12); color: var(--orange); }
      .status-pill.triage { background: rgba(37, 99, 235, 0.12); color: var(--blue); }
      .status-pill.approved { background: rgba(13, 148, 136, 0.12); color: var(--brand-dark); }
      .status-pill.assigned { background: rgba(99, 102, 241, 0.12); color: #4f46e5; }
      .status-pill.doing { background: rgba(124, 58, 237, 0.12); color: #6d28d9; }
      .status-pill.review { background: rgba(2, 132, 199, 0.12); color: #0369a1; }
      .status-pill.launched { background: rgba(22, 163, 74, 0.14); color: #15803d; }
      .status-pill.paused { background: rgba(100, 116, 139, 0.14); color: #475569; }
      .status-pill.reward { background: rgba(202, 138, 4, 0.16); color: #a16207; }
      .priority-pill.high { background: rgba(185, 28, 28, 0.10); color: var(--red); }
      .priority-pill.medium { background: rgba(188, 88, 46, 0.12); color: var(--orange); }
      .priority-pill.low { background: rgba(100, 116, 139, 0.12); color: #475569; }
      .manager-panel {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(13, 148, 136, 0.05);
      }
      .manager-panel textarea {
        min-height: 74px;
      }
      .comment-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .comment-item {
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(255,255,255,0.88);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      .feedback-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }
      .feedback-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255,255,255,0.78);
      }
      .feedback-card.is-done {
        opacity: 0.72;
      }
      .feedback-meta {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.6;
      }
      .feedback-content {
        margin-top: 10px;
        color: var(--ink);
        line-height: 1.7;
      }
      .feedback-summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .feedback-summary-card {
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
        background: rgba(255,255,255,0.76);
      }
      .feedback-summary-card span {
        color: var(--muted);
        font-size: 12px;
      }
      .feedback-summary-card strong {
        display: block;
        margin-top: 6px;
        font-size: 24px;
      }
      .feedback-rank-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 14px;
      }
      .feedback-toolbar {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) 150px auto;
        gap: 10px;
        margin-top: 14px;
      }
      .feedback-toolbar input,
      .feedback-toolbar select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 0 12px;
        background: rgba(255,255,255,0.9);
        color: var(--ink);
      }
      .muted {
        color: var(--muted);
      }
      .pipeline {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 12px;
        margin-top: 16px;
      }
      .pipeline-column {
        padding: 14px;
        min-height: 190px;
      }
      .pipeline-column h3 {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
      }
      .pipeline-item {
        margin-top: 10px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255,255,255,0.82);
        border: 1px solid var(--line);
      }
      .pipeline-item strong {
        display: block;
        font-size: 13px;
      }
      .pipeline-item span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }
      .module-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }
      .module-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: rgba(255,255,255,0.76);
      }
      .module-card strong { display: block; margin-bottom: 8px; }
      .empty {
        padding: 24px;
        color: var(--muted);
        text-align: center;
      }
      @media (max-width: 1080px) {
        .hero,
        .grid {
          grid-template-columns: 1fr;
        }
        .stat-grid,
        .pipeline,
        .module-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 720px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
        .stat-grid,
        .form-grid,
        .filters,
        .manager-panel,
        .feedback-grid,
        .feedback-summary,
        .feedback-rank-grid,
        .feedback-toolbar,
        .pipeline,
        .module-grid {
          grid-template-columns: 1fr;
        }
        .span-2 { grid-column: auto; }
      }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260623k">
  </head>
  <body data-page-permission="suggestions.access">
    <main class="shell">
      <section class="topbar">
        <div>
          <div class="brand-name">匠人程工作台</div>
          <div class="brand-subtitle">System 03 · 建议与任务协同系统</div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="./index.html">返回工作台</a>
        </nav>
      </section>

      <section class="hero">
        <article class="card">
          <p class="eyebrow">建议与任务</p>
          <h1>建议与任务协同系统</h1>
          <p class="hero-text">提交建议、评估采纳、转成任务、跟进验收，并记录贡献奖励。</p>
          <div class="tag-row">
            <span class="tag">全员可提交</span>
            <span class="tag">建议可转任务</span>
            <span class="tag">状态闭环</span>
            <span class="tag orange">贡献可奖励</span>
          </div>
          <div class="auth-note" data-role-greeting></div>
        </article>

        <aside class="card">
          <p class="eyebrow">处理规则</p>
          <h2>处理规则</h2>
          <p style="margin-top: 10px;">先评估采纳，再转任务执行；真正落地并产生价值的建议，可以进入月度优秀建议或重大贡献奖候选。</p>
        </aside>
      </section>

      <section class="stat-grid" aria-label="建议统计">
        <article class="stat-card"><span>全部事项</span><strong id="statTotal">0</strong></article>
        <article class="stat-card"><span>待评估</span><strong id="statNew">0</strong></article>
        <article class="stat-card"><span>任务中</span><strong id="statTask">0</strong></article>
        <article class="stat-card"><span>待验收</span><strong id="statReview">0</strong></article>
        <article class="stat-card"><span>已落地</span><strong id="statLaunched">0</strong></article>
        <article class="stat-card"><span>奖励候选</span><strong id="statReward">0</strong></article>
      </section>

      <section class="grid">
        <article class="card">
          <p class="eyebrow">提交</p>
          <h2>提交建议或改进事项</h2>
          <form id="suggestionForm" class="form-grid">
            <label class="field" data-manager-only-field>
              事项类型
              <select name="entryType">
                <option value="suggestion" selected>员工建议</option>
                <option value="task">直接任务（管理员）</option>
              </select>
            </label>
            <label class="field">
              分类
              <select name="category">
                <option value="流程优化">流程优化</option>
                <option value="教学质量">教学质量</option>
                <option value="招生转化">招生转化</option>
                <option value="家长服务">家长服务</option>
                <option value="成本控制">成本控制</option>
                <option value="员工关怀">员工关怀</option>
                <option value="技术工具">技术工具</option>
                <option value="校区运营">校区运营</option>
              </select>
            </label>
            <label class="field">
              影响程度
              <select name="impact">
                <option value="high">高：影响收入/安全/家长体验</option>
                <option value="medium" selected>中：影响效率或质量</option>
                <option value="low">低：局部优化</option>
              </select>
            </label>
            <label class="field span-2">
              标题
              <input name="title" required placeholder="例如：暑假班教室调换需要提前一天确认">
            </label>
            <label class="field span-2">
              具体说明
              <textarea name="content" required placeholder="建议请写清现象、影响和改法；任务请写清要做什么、交付标准和完成口径。"></textarea>
            </label>
            <label class="field">
              建议负责人
              <input name="owner" placeholder="可不填，由管理层分配">
            </label>
            <label class="field">
              希望完成时间
              <input name="dueDate" type="date">
            </label>
            <label class="check-row span-2">
              <input name="anonymous" type="checkbox">
              匿名提交给管理层
            </label>
          </form>
          <div class="actions">
            <button class="button" type="button" id="submitSuggestionButton">提交建议</button>
            <button class="button secondary" type="button" id="exportSuggestionsButton">导出建议 CSV</button>
          </div>
        </article>

        <article class="card">
          <p class="eyebrow">筛选</p>
          <h2>建议与任务筛选</h2>
          <div class="filters">
            <input id="searchInput" type="search" placeholder="搜索标题、内容、负责人">
            <select id="statusFilter">
              <option value="">全部状态</option>
              <option value="new">待评估</option>
              <option value="triage">已评估</option>
              <option value="approved">已采纳</option>
              <option value="assigned">已转任务</option>
              <option value="doing">推进中</option>
              <option value="review">待验收</option>
              <option value="launched">已落地</option>
              <option value="paused">暂缓</option>
            </select>
            <select id="taskViewFilter">
              <option value="">全部事项</option>
              <option value="my">与我有关</option>
              <option value="owner">我负责</option>
              <option value="verifier">我验收</option>
              <option value="author">我提交</option>
              <option value="open">未完成任务</option>
              <option value="overdue">逾期任务</option>
              <option value="reward">奖励候选</option>
            </select>
            <select id="categoryFilter">
              <option value="">全部分类</option>
              <option value="流程优化">流程优化</option>
              <option value="教学质量">教学质量</option>
              <option value="招生转化">招生转化</option>
              <option value="家长服务">家长服务</option>
              <option value="成本控制">成本控制</option>
              <option value="员工关怀">员工关怀</option>
              <option value="技术工具">技术工具</option>
              <option value="校区运营">校区运营</option>
            </select>
          </div>
          <div class="suggestion-list" id="suggestionList"></div>
        </article>
      </section>

      <section class="card">
        <p class="eyebrow">看板</p>
        <h2>建议与任务看板</h2>
        <div class="pipeline" id="pipelineBoard"></div>
      </section>

      <section class="card" id="siteFeedbackSection" hidden>
        <p class="eyebrow">试用反馈</p>
        <h2>全站反馈问题</h2>
        <div class="feedback-summary" id="siteFeedbackSummary"></div>
        <div class="feedback-rank-grid" id="siteFeedbackRanks"></div>
        <div class="feedback-toolbar">
          <input id="siteFeedbackSearch" type="search" placeholder="搜索老师、系统、问题内容">
          <select id="siteFeedbackStatusFilter">
            <option value="">全部状态</option>
            <option value="待处理">待处理</option>
            <option value="已转任务">已转任务</option>
            <option value="已处理">已处理</option>
          </select>
          <button class="button secondary" type="button" id="exportFeedbackButton">导出反馈 CSV</button>
        </div>
        <div class="feedback-grid" id="siteFeedbackList"></div>
      </section>

    </main>
    <script src="/jrcedu/portal/cloud-api.js?v=20260623b"></script>


    <script src="/jrcedu/portal/auth.js?v=20260623h"></script>
    <script>
      const STORAGE_KEY = "jrc-suggestion-management-v2";
      const FEEDBACK_STORAGE_KEY = "jrc-site-feedback-v1";
      const statusMap = {
        new: "待评估",
        triage: "已评估",
        approved: "已采纳",
        assigned: "已转任务",
        doing: "执行中",
        review: "待验收",
        launched: "已落地",
        paused: "暂缓"
      };
      const statusOrder = ["new", "approved", "assigned", "doing", "review", "launched"];
      const impactMap = {
        high: "高影响",
        medium: "中影响",
        low: "低影响"
      };
      const rewardMap = {
        none: "暂不奖励",
        monthly: "月度优秀建议",
        major: "重大贡献奖候选",
        bonus: "奖金建议",
        performance: "计入绩效"
      };
      const rewardStatusMap = {
        none: "未评定",
        candidate: "奖励候选",
        approved: "已确认奖励",
        paid: "已发放/已兑现"
      };
      const byId = (id) => document.getElementById(id);
      const today = () => new Date().toISOString().slice(0, 10);
      const currentEmployee = window.JRC_CURRENT_EMPLOYEE || null;
      const currentName = currentEmployee?.name || "员工";
      const canManage = window.jrcHasPermission ? window.jrcHasPermission("suggestions.edit") : false;
      const sampleSuggestionIds = new Set(["s1", "s2", "s3"]);

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function defaultSuggestions() {
        return [];
      }

      function withoutSampleSuggestions(rows) {
        return rows.filter((item) => !sampleSuggestionIds.has(String(item.id || "")));
      }

      function normalizeSuggestion(item) {
        const normalized = { ...item };
        const oldDecision = "进入" + "资产与采购" + "系统候选需求。";
        if (normalized.decision === oldDecision) {
          normalized.decision = "转入校区运营系统的设备记录处理。";
        }
        if (!normalized.taskId && ["assigned", "doing", "review", "launched"].includes(normalized.status)) {
          normalized.taskId = `task-${normalized.id || Date.now()}`;
        }
        normalized.entryType = normalized.entryType || (normalized.taskId ? "task" : "suggestion");
        normalized.verifier = normalized.verifier || "";
        normalized.taskStandard = normalized.taskStandard || "";
        normalized.subtasks = normalized.subtasks || "";
        normalized.completionReport = normalized.completionReport || "";
        normalized.rewardLevel = normalized.rewardLevel || "none";
        normalized.rewardAmount = normalized.rewardAmount || "";
        normalized.rewardReason = normalized.rewardReason || "";
        normalized.rewardStatus = normalized.rewardStatus || "none";
        return normalized;
      }

      function readRowsFromStorage(key, fallback = []) {
        try {
          const parsed = JSON.parse(localStorage.getItem(key) || "null");
          return Array.isArray(parsed) ? parsed : fallback;
        } catch (error) {
          console.warn(`Failed to read ${key}`, error);
          return fallback;
        }
      }

      function readSuggestions() {
        try {
          const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (Array.isArray(parsed)) {
            const normalized = withoutSampleSuggestions(parsed.map(normalizeSuggestion));
            if (JSON.stringify(normalized) !== JSON.stringify(parsed)) {
              localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
            }
            return normalized;
          }
        } catch (error) {
          console.warn("Failed to read suggestions", error);
        }
        return defaultSuggestions();
      }

      function writeSuggestions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
        window.JRC_CLOUD?.writeModuleData?.(STORAGE_KEY, "suggestions", suggestions).catch((error) => {
          console.warn("Failed to sync suggestions to cloud", error);
        });
      }

      async function hydrateCloudSuggestions() {
        if (!window.JRC_CLOUD?.readModuleData) return;
        try {
          const result = await window.JRC_CLOUD.readModuleData(STORAGE_KEY);
          if (!result?.ok) return;
          if (!result.data?.found) {
            window.JRC_CLOUD.writeModuleData(STORAGE_KEY, "suggestions", suggestions).catch((error) => {
              console.warn("Failed to seed suggestions to cloud", error);
            });
            return;
          }
          if (!Array.isArray(result.data.payload)) return;
          suggestions = withoutSampleSuggestions(result.data.payload.map(normalizeSuggestion));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(suggestions));
          window.JRC_CLOUD.writeModuleData(STORAGE_KEY, "suggestions", suggestions).catch((error) => {
            console.warn("Failed to clean cloud sample suggestions", error);
          });
        } catch (error) {
          console.warn("Failed to hydrate suggestions from cloud", error);
        }
      }

      let suggestions = readSuggestions();
      let siteFeedbackRows = readRowsFromStorage(FEEDBACK_STORAGE_KEY, []);

      function mergeById(rows) {
        const map = new Map();
        rows.forEach((row) => {
          if (!row || typeof row !== "object") return;
          const id = String(row.id || "").trim() || `FB-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
          map.set(id, { ...row, id });
        });
        return [...map.values()]
          .sort((left, right) => String(right.createdAt || "").localeCompare(String(left.createdAt || "")))
          .slice(0, 300);
      }

      function writeSiteFeedbackRows() {
        siteFeedbackRows = mergeById(siteFeedbackRows);
        localStorage.setItem(FEEDBACK_STORAGE_KEY, JSON.stringify(siteFeedbackRows));
        window.JRC_CLOUD?.writeModuleData?.(FEEDBACK_STORAGE_KEY, "siteFeedback", siteFeedbackRows).catch((error) => {
          console.warn("Failed to sync site feedback to cloud", error);
        });
      }

      async function hydrateSiteFeedback() {
        if (!canManage) return;
        if (!window.JRC_CLOUD?.readModuleData) return;
        try {
          const result = await window.JRC_CLOUD.readModuleData(FEEDBACK_STORAGE_KEY);
          if (!result?.ok || !Array.isArray(result.data?.payload)) return;
          siteFeedbackRows = mergeById([...siteFeedbackRows, ...result.data.payload]);
          localStorage.setItem(FEEDBACK_STORAGE_KEY, JSON.stringify(siteFeedbackRows));
        } catch (error) {
          console.warn("Failed to hydrate site feedback from cloud", error);
        }
      }

      function isDueSoon(item) {
        if (!item.dueDate || ["launched", "paused"].includes(item.status)) return false;
        const due = new Date(item.dueDate + "T00:00:00");
        const now = new Date(today() + "T00:00:00");
        const diffDays = Math.ceil((due - now) / 86400000);
        return diffDays <= 3;
      }

      function isOverdue(item) {
        if (!item.dueDate || ["launched", "paused"].includes(item.status)) return false;
        const due = new Date(item.dueDate + "T00:00:00");
        const now = new Date(today() + "T00:00:00");
        return due < now;
      }

      function isOpenTask(item) {
        return ["assigned", "doing", "review"].includes(item.status);
      }

      function matchesTaskView(item, view) {
        if (!view) return true;
        if (view === "my") return [item.owner, item.verifier, item.author].some((value) => String(value || "") === currentName);
        if (view === "owner") return String(item.owner || "") === currentName;
        if (view === "verifier") return String(item.verifier || "") === currentName;
        if (view === "author") return String(item.author || "") === currentName;
        if (view === "open") return isOpenTask(item);
        if (view === "overdue") return isOverdue(item);
        if (view === "reward") return item.rewardStatus === "candidate";
        return true;
      }

      function filteredSuggestions() {
        const keyword = byId("searchInput").value.trim().toLowerCase();
        const status = byId("statusFilter").value;
        const category = byId("categoryFilter").value;
        const taskView = byId("taskViewFilter").value;
        return suggestions.filter((item) => {
          const haystack = [item.title, item.content, item.owner, item.author, item.category].join(" ").toLowerCase();
          return (!keyword || haystack.includes(keyword)) &&
            (!status || item.status === status) &&
            (!category || item.category === category) &&
            matchesTaskView(item, taskView);
        }).sort((left, right) => {
          if (isOverdue(left) !== isOverdue(right)) return isOverdue(left) ? -1 : 1;
          return String(left.dueDate || "9999-12-31").localeCompare(String(right.dueDate || "9999-12-31"));
        });
      }

      function renderStats() {
        byId("statTotal").textContent = suggestions.length;
        byId("statNew").textContent = suggestions.filter((item) => item.status === "new").length;
        byId("statTask").textContent = suggestions.filter((item) => ["assigned", "doing"].includes(item.status)).length;
        byId("statReview").textContent = suggestions.filter((item) => item.status === "review").length;
        byId("statLaunched").textContent = suggestions.filter((item) => item.status === "launched").length;
        byId("statReward").textContent = suggestions.filter((item) => item.rewardStatus === "candidate").length;
      }

      function renderSiteFeedback() {
        const section = byId("siteFeedbackSection");
        const list = byId("siteFeedbackList");
        if (!section || !list) return;
        section.hidden = !canManage;
        if (!canManage) return;
        const keyword = String(byId("siteFeedbackSearch")?.value || "").trim().toLowerCase();
        const statusFilter = String(byId("siteFeedbackStatusFilter")?.value || "");
        const summaryNode = byId("siteFeedbackSummary");
        const ranksNode = byId("siteFeedbackRanks");
        const pendingRows = siteFeedbackRows.filter((row) => !["已处理", "已转任务"].includes(row.status));
        const taskRows = siteFeedbackRows.filter((row) => row.status === "已转任务");
        const teacherNames = new Set(siteFeedbackRows.map((row) => row.userName || "未登录"));
        const systemNames = new Set(siteFeedbackRows.map((row) => row.system || "未知页面"));
        const countBy = (field) => {
          const map = new Map();
          siteFeedbackRows.forEach((row) => {
            const key = String(row[field] || (field === "userName" ? "未登录" : "未知页面"));
            map.set(key, (map.get(key) || 0) + 1);
          });
          return [...map.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
        };
        if (summaryNode) {
          summaryNode.innerHTML = [
            ["试用反馈", siteFeedbackRows.length],
            ["待处理", pendingRows.length],
            ["已转任务", taskRows.length],
            ["参与老师", teacherNames.size],
            ["涉及系统", systemNames.size]
          ].map(([label, value]) => `
            <div class="feedback-summary-card"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>
          `).join("");
        }
        if (ranksNode) {
          const teacherRows = countBy("userName");
          const systemRows = countBy("system");
          const renderRank = (title, rows) => `
            <div class="feedback-card">
              <h3>${escapeHtml(title)}</h3>
              <div class="comment-list">
                ${rows.length ? rows.map(([name, count]) => `
                  <div class="comment-item"><strong>${escapeHtml(name)}：</strong>${count} 条</div>
                `).join("") : `<div class="empty">暂无</div>`}
              </div>
            </div>
          `;
          ranksNode.innerHTML = renderRank("试用贡献记录", teacherRows) + renderRank("系统反馈分布", systemRows);
        }
        const rows = [...siteFeedbackRows]
          .filter((row) => {
            const status = row.status || "待处理";
            const haystack = [row.userName, row.username, row.role, row.system, row.type, row.content, row.url]
              .join(" ")
              .toLowerCase();
            return (!statusFilter || status === statusFilter) && (!keyword || haystack.includes(keyword));
          })
          .sort((left, right) => {
            const leftDone = ["已处理", "已转任务"].includes(left.status);
            const rightDone = ["已处理", "已转任务"].includes(right.status);
            if (leftDone !== rightDone) return leftDone ? 1 : -1;
            return String(right.createdAt || "").localeCompare(String(left.createdAt || ""));
          })
          .slice(0, 20);
        if (!rows.length) {
          list.innerHTML = `<div class="empty">暂无符合条件的反馈。</div>`;
          return;
        }
        list.innerHTML = rows.map((row) => {
          const done = ["已处理", "已转任务"].includes(row.status);
          return `
            <article class="feedback-card ${done ? "is-done" : ""}" data-feedback-id="${escapeHtml(row.id)}">
              <div class="suggestion-head">
                <div>
                  <div class="suggestion-title">${escapeHtml(row.type || "试用反馈")}</div>
                  <div class="feedback-meta">
                    ${escapeHtml(row.userName || "未登录")}｜${escapeHtml(row.system || "未知页面")}
                    <br>${escapeHtml((row.createdAt || "").replace("T", " ").slice(0, 19))}
                  </div>
                </div>
                <span class="status-pill ${done ? "launched" : "new"}">${escapeHtml(row.status || "待处理")}</span>
              </div>
              <p class="feedback-content">${escapeHtml(row.content || "")}</p>
              <div class="card-tools">
                <a class="button secondary" href="${escapeHtml(row.url || "#")}" target="_blank" rel="noreferrer">打开页面</a>
                ${!done ? `<button class="button" type="button" data-feedback-action="task">转为任务</button>` : ""}
                ${row.status !== "已处理" ? `<button class="button secondary" type="button" data-feedback-action="done">标记已处理</button>` : ""}
              </div>
            </article>
          `;
        }).join("");
      }

      function renderPipeline() {
        byId("pipelineBoard").innerHTML = statusOrder.map((status) => {
          const items = suggestions.filter((item) => item.status === status).slice(0, 4);
          return `
            <section class="pipeline-column">
              <h3>${statusMap[status]} <span>${suggestions.filter((item) => item.status === status).length}</span></h3>
              ${items.length ? items.map((item) => `
                <div class="pipeline-item">
                  <strong>${escapeHtml(item.title)}</strong>
                  <span>${escapeHtml(item.owner || "未分配")}｜${escapeHtml(item.dueDate || "无截止")}</span>
                </div>
              `).join("") : `<div class="empty">暂无</div>`}
            </section>
          `;
        }).join("");
      }

      function renderList() {
        const list = filteredSuggestions();
        byId("suggestionList").innerHTML = list.length ? list.map((item) => `
          <article class="suggestion-card ${isOverdue(item) ? "overdue" : ""}" data-id="${escapeHtml(item.id)}">
            <div class="suggestion-head">
              <div>
                <div class="suggestion-title">${escapeHtml(item.title)}</div>
                <div class="suggestion-meta">
                  ${escapeHtml(item.category)}｜${escapeHtml(item.anonymous ? "匿名" : item.author)}｜${escapeHtml(item.createdAt)}
                  ${item.entryType === "task" ? "｜直接任务" : "｜建议"}
                  ${item.owner ? `｜负责人 ${escapeHtml(item.owner)}` : "｜未分配负责人"}
                  ${item.verifier ? `｜验收人 ${escapeHtml(item.verifier)}` : ""}
                  ${item.dueDate ? `｜截止 ${escapeHtml(item.dueDate)}` : ""}
                </div>
              </div>
              <div class="card-tools">
                <span class="status-pill ${escapeHtml(item.status)}">${escapeHtml(statusMap[item.status] || item.status)}</span>
                ${isOverdue(item) ? `<span class="status-pill reward">已逾期</span>` : ""}
                <span class="priority-pill ${escapeHtml(item.impact)}">${escapeHtml(impactMap[item.impact] || "中影响")}</span>
              </div>
            </div>
            <p class="suggestion-content">${escapeHtml(item.content)}</p>
            <div class="card-tools">
              <button class="button secondary" type="button" data-action="vote">支持 ${Number(item.votes || 0)}</button>
              <button class="button secondary" type="button" data-action="comment">添加跟进</button>
              ${["assigned", "doing"].includes(item.status) ? `<button class="button secondary" type="button" data-action="complete-report">提交完成反馈</button>` : ""}
              ${canManage && ["triage", "approved"].includes(item.status) ? `<button class="button" type="button" data-action="convert-task">转为任务</button>` : ""}
              ${canManage && item.status === "review" ? `<button class="button" type="button" data-action="accept-task">验收落地</button>` : ""}
              ${canManage ? `<button class="button danger" type="button" data-action="delete">删除</button>` : ""}
            </div>
            ${item.taskId ? `<div class="comment-item"><strong>任务编号：</strong>${escapeHtml(item.taskId)}${item.taskStandard ? `｜<strong>完成标准：</strong>${escapeHtml(item.taskStandard)}` : ""}</div>` : ""}
            ${item.subtasks ? `<div class="comment-item"><strong>子任务：</strong><br>${escapeHtml(item.subtasks).replace(/\n/g, "<br>")}</div>` : ""}
            ${item.completionReport ? `<div class="comment-item"><strong>完成反馈：</strong>${escapeHtml(item.completionReport)}</div>` : ""}
            ${item.decision ? `<div class="comment-item"><strong>处理结论：</strong>${escapeHtml(item.decision)}</div>` : ""}
            ${item.rewardStatus !== "none" || item.rewardLevel !== "none" ? `
              <div class="comment-item">
                <strong>贡献奖励：</strong>${escapeHtml(rewardMap[item.rewardLevel] || item.rewardLevel)}
                ｜${escapeHtml(rewardStatusMap[item.rewardStatus] || item.rewardStatus)}
                ${item.rewardAmount ? `｜建议金额 ${escapeHtml(item.rewardAmount)}` : ""}
                ${item.rewardReason ? `<br>${escapeHtml(item.rewardReason)}` : ""}
              </div>
            ` : ""}
            <div class="comment-list">
              ${(item.comments || []).map((comment) => `
                <div class="comment-item"><strong>${escapeHtml(comment.author)}：</strong>${escapeHtml(comment.text)} <span class="muted">${escapeHtml(comment.time || "")}</span></div>
              `).join("")}
            </div>
            ${canManage ? `
              <div class="manager-panel">
                <label class="field">
                  状态
                  <select data-manager-field="status">
                    ${Object.entries(statusMap).map(([value, label]) => `<option value="${value}" ${item.status === value ? "selected" : ""}>${label}</option>`).join("")}
                  </select>
                </label>
                <label class="field">
                  负责人
                  <input data-manager-field="owner" value="${escapeHtml(item.owner || "")}">
                </label>
                <label class="field">
                  验收人
                  <input data-manager-field="verifier" value="${escapeHtml(item.verifier || "")}">
                </label>
                <label class="field">
                  截止日期
                  <input data-manager-field="dueDate" type="date" value="${escapeHtml(item.dueDate || "")}">
                </label>
                <label class="field span-2">
                  任务完成标准
                  <textarea data-manager-field="taskStandard">${escapeHtml(item.taskStandard || "")}</textarea>
                </label>
                <label class="field span-2">
                  子任务清单
                  <textarea data-manager-field="subtasks" placeholder="每行一条，可先拆给不同组员线下执行。">${escapeHtml(item.subtasks || "")}</textarea>
                </label>
                <label class="field">
                  贡献奖励
                  <select data-manager-field="rewardLevel">
                    ${Object.entries(rewardMap).map(([value, label]) => `<option value="${value}" ${item.rewardLevel === value ? "selected" : ""}>${label}</option>`).join("")}
                  </select>
                </label>
                <label class="field">
                  奖励状态
                  <select data-manager-field="rewardStatus">
                    ${Object.entries(rewardStatusMap).map(([value, label]) => `<option value="${value}" ${item.rewardStatus === value ? "selected" : ""}>${label}</option>`).join("")}
                  </select>
                </label>
                <label class="field">
                  奖励金额建议
                  <input data-manager-field="rewardAmount" value="${escapeHtml(item.rewardAmount || "")}" placeholder="例如：100 元 / 计入绩效">
                </label>
                <label class="field">
                  任务编号
                  <input data-manager-field="taskId" value="${escapeHtml(item.taskId || "")}" placeholder="转任务后自动生成">
                </label>
                <label class="field span-2">
                  奖励理由
                  <textarea data-manager-field="rewardReason">${escapeHtml(item.rewardReason || "")}</textarea>
                </label>
                <label class="field span-2">
                  处理结论 / 下一步
                  <textarea data-manager-field="decision">${escapeHtml(item.decision || "")}</textarea>
                </label>
                <div class="actions">
                  <button class="button" type="button" data-action="save-management">保存处理</button>
                </div>
              </div>
            ` : ""}
          </article>
        `).join("") : `<div class="empty">没有符合筛选条件的建议。</div>`;
      }

      function renderAll() {
        renderStats();
        renderPipeline();
        renderList();
        renderSiteFeedback();
      }

      function applyFormPermission() {
        document.querySelectorAll("[data-manager-only-field]").forEach((node) => {
          node.hidden = !canManage;
          const select = node.querySelector("select");
          if (select && !canManage) select.value = "suggestion";
        });
      }

      function addSuggestion() {
        const form = byId("suggestionForm");
        const data = new FormData(form);
        const title = String(data.get("title") || "").trim();
        const content = String(data.get("content") || "").trim();
        if (!title || !content) return;
        const entryType = String(data.get("entryType") || "suggestion");
        if (entryType === "task" && !canManage) {
          alert("直接新增任务需要建议系统管理权限。普通员工可以先提交建议。");
          return;
        }
        const anonymous = data.get("anonymous") === "on";
        const owner = String(data.get("owner") || "").trim();
        const isDirectTask = entryType === "task";
        suggestions.unshift({
          id: `${isDirectTask ? "t" : "s"}-${Date.now()}`,
          entryType,
          title,
          category: String(data.get("category") || "流程优化"),
          impact: String(data.get("impact") || "medium"),
          content,
          author: anonymous ? "匿名" : currentName,
          anonymous,
          createdAt: today(),
          status: isDirectTask ? "assigned" : "new",
          owner: isDirectTask ? (owner || currentName) : owner,
          dueDate: String(data.get("dueDate") || "").trim(),
          verifier: isDirectTask ? currentName : "",
          taskId: isDirectTask ? `task-${Date.now()}` : "",
          taskStandard: isDirectTask ? content : "",
          subtasks: "",
          completionReport: "",
          rewardLevel: "none",
          rewardAmount: "",
          rewardReason: "",
          rewardStatus: "none",
          votes: 0,
          liked: false,
          decision: "",
          comments: []
        });
        writeSuggestions();
        form.reset();
        renderAll();
      }

      function findCardSuggestion(target) {
        const card = target.closest("[data-id]");
        if (!card) return null;
        return suggestions.find((item) => item.id === card.getAttribute("data-id"));
      }

      function saveManagement(button) {
        const card = button.closest("[data-id]");
        const item = findCardSuggestion(button);
        if (!item || !card) return;
        card.querySelectorAll("[data-manager-field]").forEach((field) => {
          item[field.getAttribute("data-manager-field")] = field.value;
        });
        if (!item.owner && item.status !== "new") item.owner = currentName;
        if (!item.verifier && ["review", "launched"].includes(item.status)) item.verifier = currentName;
        if (["assigned", "doing", "review", "launched"].includes(item.status) && !item.taskId) {
          item.taskId = `task-${Date.now()}`;
        }
        writeSuggestions();
        renderAll();
      }

      function convertToTask(item) {
        item.status = "assigned";
        item.taskId = item.taskId || `task-${Date.now()}`;
        item.owner = item.owner || currentName;
        item.verifier = item.verifier || currentName;
        item.taskStandard = item.taskStandard || "请负责人填写执行结果，提交后由验收人确认是否落地。";
        item.decision = item.decision || "已采纳，转为执行任务。";
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: `已转为任务，负责人：${item.owner}，验收人：${item.verifier}。`, time: today() });
        writeSuggestions();
        renderAll();
      }

      function findFeedback(target) {
        const card = target.closest("[data-feedback-id]");
        if (!card) return null;
        return siteFeedbackRows.find((row) => row.id === card.getAttribute("data-feedback-id"));
      }

      function convertFeedbackToTask(feedback) {
        if (!feedback) return;
        const createdDate = today();
        suggestions.unshift({
          id: `t-feedback-${Date.now()}`,
          entryType: "task",
          title: `处理反馈：${feedback.type || "试用问题"}`,
          category: "技术工具",
          impact: feedback.type === "数据不对" || feedback.type === "按钮点不开" ? "high" : "medium",
          content: `${feedback.content || ""}\n\n来源页面：${feedback.system || "-"}\n反馈人：${feedback.userName || "未登录"}\n页面链接：${feedback.url || "-"}`,
          author: feedback.userName || "系统反馈",
          anonymous: false,
          createdAt: createdDate,
          status: "assigned",
          owner: currentName,
          dueDate: createdDate,
          verifier: currentName,
          taskId: `task-feedback-${Date.now()}`,
          taskStandard: "确认问题是否存在；能修则修复并上线，不能修则写明原因和替代处理方式。",
          subtasks: "",
          completionReport: "",
          rewardLevel: "none",
          rewardAmount: "",
          rewardReason: "",
          rewardStatus: "none",
          votes: 0,
          liked: false,
          decision: "来自全站反馈，已转为执行任务。",
          sourceFeedbackId: feedback.id,
          comments: [{ author: currentName, text: "全站反馈已转为任务。", time: createdDate }]
        });
        feedback.status = "已转任务";
        feedback.processedAt = new Date().toISOString();
        feedback.processedBy = currentName;
        writeSuggestions();
        writeSiteFeedbackRows();
        renderAll();
      }

      function submitCompletion(item) {
        const text = prompt("填写完成反馈：做了什么、结果如何、还缺什么");
        if (!text || !text.trim()) return;
        item.completionReport = text.trim();
        item.status = "review";
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: `提交完成反馈：${text.trim()}`, time: today() });
        writeSuggestions();
        renderAll();
      }

      function acceptTask(item) {
        item.status = "launched";
        item.verifier = item.verifier || currentName;
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: "已验收落地。", time: today() });
        if (item.rewardLevel !== "none" && item.rewardStatus === "none") {
          item.rewardStatus = "candidate";
        }
        writeSuggestions();
        renderAll();
      }

      function addComment(item) {
        const text = prompt("填写跟进记录或补充说明");
        if (!text || !text.trim()) return;
        item.comments = item.comments || [];
        item.comments.push({ author: currentName, text: text.trim(), time: today() });
        writeSuggestions();
        renderAll();
      }

      function exportCsv() {
        const rows = [
          ["标题", "分类", "影响程度", "状态", "提交人", "负责人", "验收人", "任务编号", "截止日期", "支持数", "完成标准", "子任务", "完成反馈", "奖励类型", "奖励状态", "奖励金额建议", "奖励理由", "内容", "处理结论"],
          ...suggestions.map((item) => [
            item.title,
            item.category,
            impactMap[item.impact] || item.impact,
            statusMap[item.status] || item.status,
            item.author,
            item.owner,
            item.verifier,
            item.taskId,
            item.dueDate,
            item.votes,
            item.taskStandard,
            item.subtasks,
            item.completionReport,
            rewardMap[item.rewardLevel] || item.rewardLevel,
            rewardStatusMap[item.rewardStatus] || item.rewardStatus,
            item.rewardAmount,
            item.rewardReason,
            item.content,
            item.decision
          ])
        ];
        const csv = rows.map((row) => row.map((cell) => {
          const text = String(cell ?? "");
          return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `建议管理台账-${today()}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportFeedbackCsv() {
        const rows = [
          ["提交时间", "老师", "用户名", "角色", "系统页面", "问题类型", "状态", "问题说明", "页面链接", "处理人", "处理时间"],
          ...siteFeedbackRows.map((row) => [
            row.createdAt || "",
            row.userName || "",
            row.username || "",
            row.role || "",
            row.system || "",
            row.type || "",
            row.status || "待处理",
            row.content || "",
            row.url || "",
            row.processedBy || "",
            row.processedAt || ""
          ])
        ];
        const csv = rows.map((row) => row.map((cell) => {
          const text = String(cell ?? "");
          return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
        }).join(",")).join("\n");
        const blob = new Blob(["\ufeff" + csv], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `试用反馈台账-${today()}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      byId("submitSuggestionButton").addEventListener("click", addSuggestion);
      byId("exportSuggestionsButton").addEventListener("click", exportCsv);
      byId("exportFeedbackButton")?.addEventListener("click", exportFeedbackCsv);
      byId("siteFeedbackSearch")?.addEventListener("input", renderSiteFeedback);
      byId("siteFeedbackStatusFilter")?.addEventListener("change", renderSiteFeedback);
      ["searchInput", "statusFilter", "taskViewFilter", "categoryFilter"].forEach((id) => {
        byId(id).addEventListener("input", renderList);
        byId(id).addEventListener("change", renderList);
      });
      byId("suggestionList").addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-action]");
        if (!actionButton) return;
        const item = findCardSuggestion(actionButton);
        if (!item) return;
        const action = actionButton.getAttribute("data-action");
        if (action === "vote") item.votes = Number(item.votes || 0) + 1;
        if (action === "comment") addComment(item);
        if (action === "convert-task" && canManage) {
          convertToTask(item);
          return;
        }
        if (action === "complete-report") {
          submitCompletion(item);
          return;
        }
        if (action === "accept-task" && canManage) {
          acceptTask(item);
          return;
        }
        if (action === "delete" && canManage) suggestions = suggestions.filter((candidate) => candidate.id !== item.id);
        if (action === "save-management" && canManage) {
          saveManagement(actionButton);
          return;
        }
        writeSuggestions();
        renderAll();
      });
      byId("siteFeedbackList")?.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-feedback-action]");
        if (!actionButton || !canManage) return;
        const feedback = findFeedback(actionButton);
        if (!feedback) return;
        const action = actionButton.getAttribute("data-feedback-action");
        if (action === "task") {
          convertFeedbackToTask(feedback);
          return;
        }
        if (action === "done") {
          feedback.status = "已处理";
          feedback.processedAt = new Date().toISOString();
          feedback.processedBy = currentName;
          writeSiteFeedbackRows();
          renderAll();
        }
      });

      (async () => {
        applyFormPermission();
        await hydrateCloudSuggestions();
        await hydrateSiteFeedback();
        renderAll();
      })();
    </script>
    <script src="/jrcedu/portal/mobile-unified.js?v=20260623k"></script>
  </body>
</html>
