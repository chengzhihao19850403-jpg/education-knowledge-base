<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>排课系统</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans CJK SC", sans-serif;
        background: #f6f8f7;
        color: #172132;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(23, 33, 50, 0.08);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(23, 33, 50, 0.12);
      }
      .topline { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      h1 { margin: 0; font-size: 26px; }
      p { margin: 12px 0 0; color: #627086; line-height: 1.7; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 999px;
        background: #0d9488;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      a.secondary {
        background: #fff;
        color: #172132;
        border: 1px solid rgba(23, 33, 50, 0.10);
      }
      .quick {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 16px;
      }
      .quick a {
        border-radius: 14px;
        min-height: 52px;
      }
      @media (max-width: 640px) {
        body { display: block; }
        main {
          width: min(100% - 20px, 560px);
          margin: 18px auto;
          padding: 20px;
        }
        .quick { grid-template-columns: 1fr; }
        .topline { align-items: flex-start; flex-direction: column; }
        .topline a { width: 100%; }
      }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260623j">
  </head>
  <body data-page-permission="paike.access">
    <main>
      <div class="topline">
        <h1>排课系统</h1>
        <a class="secondary" href="/jrcedu/portal/index.html">返回工作台</a>
      </div>
      <p>按老师熟悉的旧版界面进入，云端保存和点名课销逐步接入。</p>
      <div class="quick">
        <a data-requires-permission="paike.access" href="/jrcedu/paike-legacy/index.html">上传总表</a>
        <a data-requires-permission="paike.access" href="/jrcedu/paike-legacy/prototype/june.html?simple=1">平时模式</a>
        <a data-requires-permission="paike.access" href="/jrcedu/paike-legacy/prototype/index.html?simple=1">暑假模式</a>
        <a data-requires-permission="studentService.access" href="/jrcedu/portal/student-service.html">点名课销</a>
      </div>
    </main>
    <script src="/jrcedu/portal/cloud-api.js?v=20260623b"></script>
    <script src="/jrcedu/portal/auth.js?v=20260623h"></script>
    <script src="/jrcedu/portal/mobile-unified.js?v=20260623j"></script>
  </body>
</html>
