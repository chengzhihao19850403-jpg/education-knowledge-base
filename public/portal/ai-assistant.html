<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>匠人程工作台｜我的 AI 助手</title>
    <style>
      :root {
        --panel: rgba(255, 255, 255, 0.96);
        --ink: #172132;
        --muted: #637083;
        --line: rgba(23, 33, 50, 0.08);
        --brand: #0d9488;
        --brand-dark: #0f766e;
        --brand-soft: rgba(13, 148, 136, 0.10);
        --amber: #b45309;
        --shadow: 0 18px 46px rgba(23, 33, 50, 0.10);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #fbfcff 0%, #edf7f4 100%);
      }
      button, input, select, textarea { font: inherit; }
      .shell { width: min(1180px, calc(100vw - 32px)); margin: 0 auto; padding: 32px 0 56px; }
      .topbar, .card, .result-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.70); border-radius: 22px; box-shadow: var(--shadow); }
      .topbar { display: flex; justify-content: space-between; gap: 14px; align-items: center; padding: 14px 18px; margin-bottom: 18px; }
      .brand-name { font-size: 18px; font-weight: 800; }
      .brand-subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }
      .nav-link, .button { display: inline-flex; align-items: center; justify-content: center; min-height: 40px; padding: 0 14px; border-radius: 999px; border: 1px solid var(--line); text-decoration: none; background: #fff; color: var(--ink); font-size: 13px; cursor: pointer; }
      .button { border: 0; background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%); color: #fff; font-weight: 800; }
      .button.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
      .button.warn { background: rgba(180,83,9,0.12); color: var(--amber); border: 1px solid rgba(180,83,9,0.18); }
      .button:disabled { cursor: not-allowed; opacity: 0.58; }
      .hero, .grid { display: grid; grid-template-columns: minmax(0, 0.95fr) minmax(360px, 1.05fr); gap: 18px; }
      .card { padding: 22px; }
      .eyebrow { margin: 0 0 10px; color: var(--brand); font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
      h1, h2, h3, p { margin: 0; }
      h1 { font-size: clamp(30px, 4vw, 42px); line-height: 1.08; }
      h2 { font-size: 22px; }
      p { color: var(--muted); line-height: 1.7; }
      .hero-text { margin-top: 12px; }
      .tag-row, .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .tag { display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 10px; background: var(--brand-soft); color: var(--brand-dark); font-size: 12px; font-weight: 800; }
      .auth-note, .notice { margin-top: 16px; padding: 14px 16px; border-radius: 16px; background: var(--brand-soft); border: 1px solid rgba(13,148,136,0.16); color: var(--muted); line-height: 1.65; }
      .notice.warn { background: rgba(180,83,9,0.08); border-color: rgba(180,83,9,0.16); }
      .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-top: 16px; }
      label.field { display: grid; gap: 6px; color: var(--muted); font-size: 13px; }
      .field input, .field select, .field textarea { width: 100%; min-height: 42px; border: 1px solid var(--line); border-radius: 12px; padding: 0 12px; color: var(--ink); background: #fff; }
      .field textarea { min-height: 190px; padding: 10px 12px; resize: vertical; line-height: 1.65; }
      .span-2 { grid-column: 1 / -1; }
      .result-panel { padding: 18px; margin-top: 16px; }
      .result-grid { display: grid; gap: 12px; margin-top: 12px; }
      .result-item { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: rgba(255,255,255,0.78); }
      .result-item strong { display: block; margin-bottom: 8px; color: var(--ink); }
      .result-item p, .result-item li { color: var(--muted); line-height: 1.7; }
      .result-text { white-space: pre-wrap; color: var(--muted); line-height: 1.85; margin: 0; }
      .draft-list { display: grid; gap: 10px; margin-top: 12px; }
      .draft-item { padding: 12px; border-radius: 14px; border: 1px solid var(--line); background: #fff; }
      .draft-item strong { display: block; }
      .draft-item span { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; }
      @media (max-width: 900px) { .hero, .grid { grid-template-columns: 1fr; } }
      @media (max-width: 720px) { .topbar { flex-direction: column; align-items: flex-start; } .form-grid { grid-template-columns: 1fr; } .span-2 { grid-column: auto; } .button, .nav-link { width: 100%; min-height: 46px; } }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260623j">
  </head>
  <body data-page-permission="ai.access">
    <main class="shell">
      <section class="topbar">
        <div>
          <div class="brand-name">匠人程工作台</div>
          <div class="brand-subtitle">AI · 我的 AI 助手</div>
        </div>
        <nav>
          <a class="nav-link" href="./index.html">返回工作台</a>
        </nav>
      </section>

      <section class="hero">
        <article class="card">
          <p class="eyebrow">AI Assistant</p>
          <h1>我的 AI 助手</h1>
          <p class="hero-text">把老师临时说出来的课堂反馈、招生跟进、学管沟通和工作待办，整理成能保存、能复制、能继续流转的文字草稿。</p>
          <div class="tag-row">
            <span class="tag">课堂反馈</span>
            <span class="tag">招生跟进</span>
            <span class="tag">学管沟通</span>
            <span class="tag">资料归档</span>
            <span class="tag">财务核对</span>
          </div>
          <div class="auth-note" data-role-greeting></div>
        </article>
        <aside class="card">
          <p class="eyebrow">使用规则</p>
          <h2>先整理，后确认</h2>
          <p style="margin-top:10px;">AI 生成内容只作为草稿。涉及学生、家长、财务和考核的信息，必须由老师确认后再保存或发送。</p>
          <div class="notice warn" id="aiConfigNotice">正在检测 AI 接口状态。</div>
        </aside>
      </section>

      <section class="grid" style="margin-top:18px;">
        <article class="card">
          <p class="eyebrow">输入</p>
          <h2>语音或文字记录</h2>
          <div class="form-grid">
            <label class="field">
              整理类型
              <select id="aiModeInput">
                <option value="classFeedback">课堂反馈（发家长）</option>
                <option value="feedback">课后反馈</option>
                <option value="parentCommunication">学管沟通</option>
                <option value="attendanceFollowup">点名缺勤跟进</option>
                <option value="admissionsFollowup">招生跟进</option>
                <option value="curriculumArchive">课件资料归档</option>
                <option value="financeCheck">财务核对</option>
                <option value="todo">待办事项</option>
                <option value="suggestion">员工建议</option>
                <option value="task">任务说明</option>
                <option value="help">工作台使用问答</option>
              </select>
            </label>
            <label class="field">
              关联对象
              <input id="aiTargetInput" placeholder="学生姓名 / 班级 / 系统名称，可不填">
            </label>
            <label class="field span-2">
              语音转文字 / 原始内容
              <textarea id="aiInputText" placeholder="可以直接打字，也可以点开始语音后说话。"></textarea>
            </label>
          </div>
          <div class="actions">
            <button class="button secondary" id="voiceStartButton" type="button">开始语音</button>
            <button class="button secondary" id="voiceStopButton" type="button" disabled>停止语音</button>
            <button class="button" id="aiRunButton" type="button">AI 整理</button>
            <button class="button secondary" id="aiClearButton" type="button">清空</button>
          </div>
          <div class="notice" id="aiMessage">语音识别依赖设备支持；如果不可用，可以用手机键盘听写后再整理。</div>
        </article>

        <article class="card">
          <p class="eyebrow">结果</p>
          <h2>整理结果</h2>
          <div class="result-panel">
            <div class="result-grid" id="aiResultBox">
              <div class="result-item"><strong>等待整理</strong><p>输入内容后点击 AI 整理。</p></div>
            </div>
            <div class="actions">
              <button class="button secondary" id="copyResultButton" type="button">复制结果</button>
              <button class="button" id="saveDraftButton" type="button">保存草稿</button>
              <button class="button" id="saveStudentServiceButton" type="button">归档学生服务</button>
              <button class="button" id="saveAdmissionsButton" type="button">归档招生系统</button>
              <button class="button" id="saveCurriculumButton" type="button">归档教研课程</button>
              <button class="button" id="saveFinanceReviewButton" type="button">送财务核对</button>
              <button class="button warn" id="saveTaskButton" type="button">转成建议/任务</button>
            </div>
          </div>
          <div class="result-panel">
            <h3>最近草稿</h3>
            <div class="draft-list" id="aiDraftList"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="/jrcedu/portal/cloud-api.js?v=20260623b"></script>
    <script src="/jrcedu/portal/auth.js?v=20260623h"></script>
    <script>
      const DRAFT_KEY = "jrc-ai-assistant-drafts-v1";
      const SUGGESTION_KEY = "jrc-suggestion-management-v2";
      const STUDENT_SERVICE_KEY = "jrc-student-service-v2";
      const ADMISSIONS_STORE_KEY = "advice-system-stage-prototype";
      const CURRICULUM_STORE_KEY = "jrc-curriculum-products-v2";
      const FINANCE_PREIMPORT_KEY = "jrc-paike-finance-preimport-2026-06-22";
      const byId = (id) => document.getElementById(id);
      const currentEmployee = window.JRC_CURRENT_EMPLOYEE || {};
      const currentName = currentEmployee.name || "员工";
      let recognition = null;
      let latestResult = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function safeParse(raw, fallback) {
        try { return JSON.parse(raw || "null") ?? fallback; } catch { return fallback; }
      }

      function mergeSuggestionRows(rows) {
        const map = new Map();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          if (!row || typeof row !== "object") return;
          const id = String(row.id || "").trim();
          if (!id) return;
          const existing = map.get(id) || {};
          map.set(id, { ...existing, ...row, id });
        });
        return [...map.values()].sort((left, right) => {
          const rightDate = String(right.createdAt || right.updatedAt || "");
          const leftDate = String(left.createdAt || left.updatedAt || "");
          return rightDate.localeCompare(leftDate);
        });
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function readDrafts() {
        const rows = safeParse(localStorage.getItem(DRAFT_KEY), []);
        return Array.isArray(rows) ? rows : [];
      }

      function writeDrafts(rows) {
        localStorage.setItem(DRAFT_KEY, JSON.stringify(rows.slice(0, 80)));
        window.JRC_CLOUD?.writeModuleData?.(DRAFT_KEY, "ai", rows.slice(0, 80)).catch(() => {});
      }

      function renderDrafts() {
        const rows = readDrafts().slice(0, 5);
        byId("aiDraftList").innerHTML = rows.length ? rows.map((row) => `
          <div class="draft-item">
            <strong>${escapeHtml(row.title || row.modeLabel || "AI 草稿")}</strong>
            <span>${escapeHtml(row.modeLabel || "-")}｜${escapeHtml(row.target || "-")}｜${escapeHtml(row.createdAt || "")}</span>
          </div>
        `).join("") : `<div class="draft-item"><strong>暂无草稿</strong><span>保存后会显示最近 5 条。</span></div>`;
      }

      function modeLabel(mode) {
        return {
          feedback: "课后反馈",
          classFeedback: "课堂反馈",
          admissionsFollowup: "招生跟进",
          parentCommunication: "学管沟通",
          attendanceFollowup: "点名缺勤跟进",
          curriculumArchive: "课件资料归档",
          financeCheck: "财务核对",
          todo: "待办事项",
          suggestion: "员工建议",
          task: "任务说明",
          help: "工作台问答"
        }[mode] || "AI 整理";
      }

      function resultToText(result) {
        if (!result) return "";
        const sections = [
          ["标题", result.title],
          ["摘要", result.summary],
          ["完整课堂反馈", result.parentMessage],
          ["整理正文", result.polishedText],
          ["建议动作", result.suggestedAction],
          ["待办", Array.isArray(result.todoItems) ? result.todoItems.map((item) => `- ${item}`).join("\n") : ""],
          ["标签", Array.isArray(result.quickTags) ? result.quickTags.join("、") : ""],
          ["结构化信息", result.structuredData && typeof result.structuredData === "object" ? JSON.stringify(result.structuredData, null, 2) : ""],
          ["内部备注", result.internalNote]
        ].filter(([, value]) => value);
        return sections.map(([label, value]) => `${label}：\n${Array.isArray(value) ? value.join("\n") : value}`).join("\n\n");
      }

      function isClassFeedbackMode() {
        return byId("aiModeInput")?.value === "classFeedback";
      }

      function normalizeFeedbackRecipient(target) {
        const raw = String(target || "").trim();
        if (!raw) return "家长您好";
        const first = raw.split(/[，,、\s/｜|]+/).filter(Boolean)[0] || raw;
        if (first === "家长") return "家长您好";
        if (/家长$/.test(first)) return `${first}您好`;
        if (/(爸爸|妈妈|父亲|母亲|父母)$/.test(first)) return `${first.replace(/^(.*?)(爸爸|妈妈|父亲|母亲|父母)$/, "$1的家长")}您好`;
        return `${first}的家长您好`;
      }

      function cleanExtractedText(value) {
        return String(value || "")
          .replace(/^[是为：:\s]+/, "")
          .replace(/[。；;，,\s]+$/, "")
          .replace(/^把/, "")
          .replace(/^(《|「|“|")/, "")
          .replace(/(》|」|”|")$/, "")
          .trim();
      }

      function splitFeedbackClauses(rawText) {
        return String(rawText || "")
          .replace(/[：:]/g, "：")
          .split(/[。；;\n，,]/)
          .map((item) => cleanExtractedText(item))
          .filter((item) => item && item.length > 1);
      }

      function hasStateSignal(text) {
        return /(状态|表现|注意力|专注|认真|积极|互动|回答|思考|配合|纪律|讲话|说话|插话|走神|开小差|提醒|制止|坐姿|精神|态度|反应|主动|听讲|听课|小动作|情绪|自信|拖拉|粗心)/.test(String(text || ""));
      }

      function hasCourseTopic(text) {
        return /(平行四边形|矩形|菱形|正方形|梯形|三角形|全等|相似|勾股|圆|几何|面积|周长|体积|函数|方程|分数|百分数|比例|应用题|行程|工程|浓度|利润|奥数|计算|科学|物理|化学|实验|力|电|光|密度|知识点|性质|判定|定义|定理|公式|题型|模型|方法|解法|解题|复习|学习|学了|讲了|上了|内容)/.test(String(text || ""));
      }

      function isHomeworkClause(text) {
        return /(作业|课后作业|家庭作业|回家作业|回去|订正|改错|做完|完成.{0,12}(题|页|讲义|练习|试卷|作业)|做.{0,12}(题|页|讲义|练习|试卷))/.test(String(text || ""));
      }

      function isPlanClause(text) {
        return /(下节课|下次课|后续|接下来|下一步|以后|继续|安排|计划|预习|巩固)/.test(String(text || ""));
      }

      function polishStateText(parts) {
        if (!parts.length) return "今天孩子上课整体状态较好，能够跟随老师节奏完成课堂学习。具体课堂表现请老师根据本节实际情况再确认补充。";
        const text = parts.join("；")
          .replace(/已经被我制止/g, "老师已及时提醒并制止")
          .replace(/已经我制止/g, "老师已及时提醒并制止")
          .replace(/已经被我提醒/g, "老师已及时提醒")
          .replace(/已经我提醒/g, "老师已及时提醒")
          .replace(/被我制止/g, "老师已及时提醒并制止")
          .replace(/我制止/g, "老师已及时提醒并制止")
          .replace(/被我提醒/g, "老师已及时提醒")
          .replace(/我提醒/g, "老师已及时提醒");
        return `${text}。整体来看，孩子能够跟随课堂节奏完成学习，后续老师会继续关注课堂专注度。`;
      }

      function parseClassFeedbackInput(rawText) {
        const clauses = splitFeedbackClauses(rawText);
        const stateParts = [];
        const homeworkParts = [];
        const contentParts = [];
        const planParts = [];
        clauses.forEach((clause) => {
          if (isHomeworkClause(clause)) homeworkParts.push(clause);
          else if (isPlanClause(clause) && !hasCourseTopic(clause)) planParts.push(clause);
          else if (hasStateSignal(clause) && !/(知识点|性质|判定|定义|定理|公式)/.test(clause)) stateParts.push(clause);
          else if (hasCourseTopic(clause)) contentParts.push(clause);
          else if (isPlanClause(clause)) planParts.push(clause);
        });
        const homework = extractHomeworkFromText(homeworkParts.join("；") || rawText);
        const courseContent = contentParts.length ? contentParts.join("；") : "本节课上课内容待老师补充";
        const planText = planParts.length ? planParts.join("；") : "下节课我们会继续进行相关知识点巩固，同时穿插重点内容预习和思维训练，帮助孩子把基础掌握得更扎实，学习效果更上一层楼✨";
        return {
          stateText: polishStateText(stateParts),
          homework,
          courseContent,
          planText
        };
      }

      function extractTemplateSection(text, label, nextLabels = []) {
        const source = String(text || "");
        const start = source.indexOf(label);
        if (start < 0) return "";
        const rest = source.slice(start + label.length);
        const nextIndexes = nextLabels
          .map((nextLabel) => rest.indexOf(nextLabel))
          .filter((index) => index >= 0);
        const end = nextIndexes.length ? Math.min(...nextIndexes) : rest.length;
        return rest.slice(0, end).trim();
      }

      function classFeedbackNeedsRebuild(parentMessage) {
        const courseSection = extractTemplateSection(parentMessage, "本次课上课内容：", ["知识点要点：", "学习情况反馈："]);
        const knowledgeSection = extractTemplateSection(parentMessage, "知识点要点：", ["学习情况反馈："]);
        return hasStateSignal(courseSection) || hasStateSignal(knowledgeSection);
      }

      function formatClassFeedbackText(value, target = "") {
        const greeting = normalizeFeedbackRecipient(target);
        let text = String(value || "")
          .replace(/^.{0,16}(妈妈|爸爸|父母|家长)[，,：:\s]*您好?[，,：:\s]*/, `${greeting}，`)
          .replace(/(上课状态：)/g, "\n\n$1\n")
          .replace(/(课后作业：)/g, "\n\n$1\n")
          .replace(/(本次课上课内容：)/g, "\n\n$1\n")
          .replace(/(知识点要点：)/g, "\n\n$1\n")
          .replace(/(学习情况反馈：)/g, "\n\n$1\n")
          .replace(/(💡\s*小技巧：)/g, "\n\n$1\n")
          .replace(/([23]\.\s*[^：\n]+表现|3\.\s*后续学习计划)/g, "\n\n$1")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
        if (text && !text.startsWith(greeting)) text = `${greeting}，\n\n${text}`;
        return text;
      }

      function ensureClassFeedbackTemplate(result, payload = {}) {
        if (!result || !isClassFeedbackMode()) return result;
        const target = payload.target ?? byId("aiTargetInput")?.value ?? "";
        const sourceText = payload.text ?? byId("aiInputText")?.value ?? "";
        const parentMessage = String(result.parentMessage || "");
        const hasTemplate = parentMessage.includes("春季小课第") && parentMessage.includes("上课状态") && parentMessage.includes("学习情况反馈") && parentMessage.includes("知识点要点");
        if (hasTemplate && !classFeedbackNeedsRebuild(parentMessage)) {
          const formatted = formatClassFeedbackText(parentMessage, target);
          return { ...result, parentMessage: formatted, polishedText: result.polishedText === parentMessage ? formatted : result.polishedText };
        }
        const template = buildClassFeedbackTemplate(target, sourceText);
        return {
          ...result,
          title: result.title || `${target || "学生"}｜课堂反馈`,
          summary: "已按校区统一课堂反馈模板生成，请老师确认空缺字段后发送。",
          parentMessage: template,
          polishedText: template,
          internalNote: result.internalNote || "模型未完整返回模板，系统已自动套用统一课堂反馈模板。请确认第几次课程、作业名称、具体知识点和下节课计划。"
        };
      }

      function renderResult(result) {
        result = ensureClassFeedbackTemplate(result);
        latestResult = result;
        const todos = Array.isArray(result.todoItems) ? result.todoItems : [];
        const tags = Array.isArray(result.quickTags) ? result.quickTags : [];

      function extractHomeworkFromText(rawText) {
        const text = String(rawText || "");
        const match = text.match(/(?:作业|课后作业|回家作业|家庭作业|回去|课后)[是为：: ]*(?:完成|做完|做|写)?([^。；;\n]+)/);
        const homework = cleanExtractedText(match?.[1] || "");
        return homework.replace(/^(完成|做完|做|写)/, "").trim() || "__";
      }

      function extractHomework(rawText) {
        return parseClassFeedbackInput(rawText).homework;
      }

      function extractCourseContent(rawText) {
        return parseClassFeedbackInput(rawText).courseContent;
      }

      function buildKnowledgePoints(rawText) {
        const content = extractCourseContent(rawText);
        const compact = content.replace(/\s+/g, "");
        const points = [];
        if (/平行四边形/.test(compact)) {
          points.push("平行四边形定义：两组对边分别平行的四边形叫平行四边形。");
          points.push("平行四边形性质：对边平行且相等，对角相等，邻角互补，对角线互相平分。");
          points.push("平行四边形判定：两组对边分别平行、两组对边分别相等、一组对边平行且相等、两组对角分别相等、对角线互相平分，都可判定为平行四边形。");
          if (/面积|底|高/.test(compact)) points.push("平行四边形面积：S = 底 × 高，底和高必须对应。");
        }
        if (/矩形/.test(compact)) points.push("矩形要点：矩形是有一个角为直角的平行四边形，四个角都是直角，对角线相等且互相平分。");
        if (/菱形/.test(compact)) points.push("菱形要点：菱形是四条边都相等的平行四边形，对角线互相垂直平分，并分别平分一组对角。");
        if (/分数|应用题/.test(compact)) points.push("分数应用题：先找准单位“1”和对应分率，常用关系是单位量 × 对应分率 = 对应量。");
        if (/百分数|利润|折扣|浓度/.test(compact)) points.push("百分数问题：百分率 = 比较量 ÷ 标准量 × 100%，增长率、折扣、利润率都要先确定比较基准。");
        if (/比例|正比例|反比例/.test(compact)) points.push("比例关系：比例式 a:b = c:d 中内项积等于外项积；正比例关注 y/x 为定值，反比例关注 xy 为定值。");
        if (/方程|等式/.test(compact)) points.push("方程思想：用未知数表示关键信息，根据等量关系建立方程，再检验结果是否符合题意。");
        if (/圆/.test(compact)) points.push("圆的公式：周长 C = 2πr = πd，面积 S = πr²，题目中要区分半径和直径。");
        if (/三角形/.test(compact)) points.push("三角形面积：S = 底 × 高 ÷ 2，解题时重点找到对应的底和高。");
        if (/长方形|正方形|几何|面积|周长|体积/.test(compact)) points.push("几何问题：先明确周长、面积或体积公式，再结合分割、补全、转化等方法解决。");
        if (/函数|一次函数|二次函数|图像/.test(compact)) points.push("函数知识：关注解析式、图像变化、交点和实际意义之间的对应关系。");
        if (/科学|物理|化学|实验|力|电|光|密度/.test(compact)) points.push("科学知识：重点理解概念定义、实验现象和结论之间的因果关系。");
        if (!points.length) points.push(content === "本节课上课内容待老师补充" ? "知识点待老师补充：请老师补充本节具体学习内容后，系统会更准确整理核心定义、公式和易错点。" : `本节核心内容：请家长让孩子复述“${content}”的核心概念、典型题型和易错点，检查是否真正理解。`);
        return points.map((point, index) => `${index + 1}. ${point}`).join("\n");
      }

      function buildClassFeedbackTemplate(target, rawText) {
        const greeting = normalizeFeedbackRecipient(target);
        const raw = String(rawText || "").trim() || "本节课课堂情况待老师补充";
        const parsed = parseClassFeedbackInput(raw);
        const homework = parsed.homework;

        return [
          `${greeting}，这是春季小课第__次课程反馈：`,
          "",
          "上课状态：",
          parsed.stateText,

          "本次课上课内容：",

      function localFallback(payload) {
        const label = modeLabel(payload.mode);
        return {
          title: payload.target ? `${payload.target}｜${label}` : label,
          summary: `已按${label}整理为草稿。`,
          polishedText: payload.text,
          todoItems: payload.mode === "todo" ? payload.text.split(/[；;。\\n]/).map((item) => item.trim()).filter(Boolean).slice(0, 8) : [],
          parentMessage: payload.mode === "classFeedback"
            ? buildClassFeedbackTemplate(payload.target, payload.text)
            : payload.mode === "feedback"
              ? `家长您好，${payload.text}。以上为本节课学习反馈，老师会继续跟进孩子的掌握情况。`

            : "已整理成草稿，请老师确认后再保存或发送。"
        };
      }

      function renderAiFailure(message) {
        latestResult = null;
        byId("aiResultBox").innerHTML = `
          <div class="result-item">
            <strong>AI 调用未成功</strong>
            <p>${escapeHtml(message || "MiniMax 没有调用成功，本次不生成课堂反馈。")}</p>
          </div>
        `;
      }

      async function runAi() {
        const text = byId("aiInputText").value.trim();
        if (!text) {
          byId("aiMessage").textContent = "请先输入文字或使用语音转文字。";
          return;
        }
        const payload = {
          mode: byId("aiModeInput").value,
          modeLabel: modeLabel(byId("aiModeInput").value),
          target: byId("aiTargetInput").value.trim(),
          text,
          operatorName: currentName,
          operatorRole: currentEmployee.role || ""
        };
        byId("aiRunButton").disabled = true;
        byId("aiMessage").textContent = "正在整理...";
        try {
          const result = await window.JRC_CLOUD?.aiAssistant?.(payload);
          if (result?.ok && result.data?.result) {
            renderResult(ensureClassFeedbackTemplate(result.data.result, payload));
            byId("aiConfigNotice").textContent = result.data.provider === "minimax"
              ? "AI 接口已接入 MiniMax。"
              : "已生成整理草稿。";
            byId("aiMessage").textContent = "整理完成，请检查后保存。";
            return;
          }
          const errorMessage = result?.data?.message || result?.data?.error || "MiniMax 没有调用成功。";
          if (payload.mode === "classFeedback") {
            renderAiFailure(errorMessage);
            byId("aiConfigNotice").textContent = "课堂反馈必须调用 MiniMax；当前未成功。";
            byId("aiMessage").textContent = "AI 调用失败，未生成课堂反馈。";
            return;
          }
          renderResult(localFallback(payload));
          byId("aiMessage").textContent = "已生成整理草稿，请检查后保存。";
        } catch (error) {
          if (payload.mode === "classFeedback") {
            const message = error?.message || "MiniMax 没有调用成功。";
            renderAiFailure(message);
            byId("aiConfigNotice").textContent = "课堂反馈必须调用 MiniMax；当前未成功。";
            byId("aiMessage").textContent = "AI 调用失败，未生成课堂反馈。";
            return;
          }
          renderResult(localFallback(payload));
          byId("aiMessage").textContent = "已生成整理草稿，请检查后保存。";
        } finally {
          byId("aiRunButton").disabled = false;
        }
      }

      function studentNameFromTarget() {
        const target = byId("aiTargetInput").value.trim();
        if (target) return target.split(/[，,、\s/｜|]+/).filter(Boolean)[0] || target;
        return latestResult?.studentName || latestResult?.title || "";
      }

      function mergeRowsById(rows) {
        const map = new Map();
        (Array.isArray(rows) ? rows : []).forEach((row) => {
          if (!row || typeof row !== "object") return;
          const id = String(row.id || row.rowId || "").trim() || `ss-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
          const existing = map.get(id) || {};
          map.set(id, { ...existing, ...row, id });
        });
        return [...map.values()].sort((left, right) => String(right.createdAt || right.updatedAt || "").localeCompare(String(left.createdAt || left.updatedAt || "")));
      }

      function structuredDataMap() {
        return latestResult?.structuredData && typeof latestResult.structuredData === "object"
          ? latestResult.structuredData
          : {};
      }

      function structuredValue(...keys) {
        const data = structuredDataMap();
        for (const key of keys) {
          const value = data[key];
          if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
        }
        return "";
      }

      function admissionStateBase(rawState) {
        const state = rawState && typeof rawState === "object" ? { ...rawState } : {};
        state.activeView = state.activeView || "dashboard";
        state.activeLeadFilter = state.activeLeadFilter || "all";
        state.leadSearchQuery = state.leadSearchQuery || "";
        state.leadOwnerFilter = state.leadOwnerFilter || "";
        state.leadChannelFilter = state.leadChannelFilter || "";
        state.leadIntentFilter = state.leadIntentFilter || "";
        state.selectedLeadName = state.selectedLeadName || "";
        state.employees = Array.isArray(state.employees) ? state.employees : [];
        state.auditLogs = Array.isArray(state.auditLogs) ? state.auditLogs : [];
        state.importSummary = state.importSummary && typeof state.importSummary === "object"
          ? state.importSummary
          : { added: 0, duplicates: 0, missingOwner: 0, missingFields: 0, results: [] };
        state.leads = Array.isArray(state.leads) ? state.leads : [];
        state.followups = Array.isArray(state.followups) ? state.followups : [];
        return state;
      }

      function buildLeadDraft(studentName) {
        return {
          studentName,
          parentPhone: structuredValue("parentPhone", "phone") || "待补电话",
          grade: structuredValue("grade") || "待补年级",
          subject: structuredValue("subject") || "数学",
          channel: structuredValue("channel") || "待补来源",
          channelMeta: structuredValue("channelOwner", "referrerName") || "AI 助手归档",
          owner: structuredValue("owner", "followupOwner") || currentName,
          status: structuredValue("leadStage") || "持续跟进中",
          trial: structuredValue("trialStatus") || "未预约",
          intent: structuredValue("intent") || "B 中意向",
          inGroup: structuredValue("inGroup") || "未进群",
          lastFollowup: "刚刚归档",
          note: latestResult?.summary || latestResult?.polishedText || "AI 招生整理",
          nextAction: latestResult?.suggestedAction || structuredValue("ownerAction") || "待确认下一步",
          parentNeed: structuredValue("parentConcerns", "parentConcern"),
          studentPainPoint: structuredValue("studentPainPoint", "serviceRisk"),
          objection: structuredValue("conversionRisk") || "暂无明确异议",
          nextFollowupDate: structuredValue("nextContactTime", "followupDate"),
          trialTeacher: structuredValue("trialTeacher"),
          trialTime: structuredValue("trialTime"),
          enrolledAmount: 0,
          createdAt: new Date().toISOString()
        };
      }

      function mergeAdmissionsState(rawState, studentName, recordText) {
        const state = admissionStateBase(rawState);
        let lead = state.leads.find((item) => item && item.studentName === studentName);
        if (!lead) {
          lead = buildLeadDraft(studentName);
          state.leads.unshift(lead);
        }
        const parentNeed = structuredValue("parentConcerns", "parentConcern");
        const painPoint = structuredValue("studentPainPoint", "serviceRisk");
        const nextDate = structuredValue("nextContactTime", "followupDate");
        const nextAction = latestResult?.suggestedAction || structuredValue("ownerAction") || lead.nextAction || "待确认";
        const objection = structuredValue("conversionRisk") || lead.objection || "暂无明确异议";
        lead.lastFollowup = "刚刚归档";
        lead.note = recordText || lead.note;
        lead.nextAction = nextAction;
        if (nextDate) lead.nextFollowupDate = nextDate;
        if (parentNeed) lead.parentNeed = parentNeed;
        if (painPoint) lead.studentPainPoint = painPoint;
        lead.objection = objection;
        const leadStage = structuredValue("leadStage");
        if (leadStage) lead.status = leadStage;
        state.selectedLeadName = studentName;
        state.followups.unshift({
          followupId: `ai-follow-${Date.now()}`,
          studentName,
          time: new Date().toISOString(),
          text: recordText,
          method: "AI 整理",
          parentNeed,
          painPoint,
          objection,
          nextDate,
          createdBy: currentName
        });
        state.auditLogs.unshift({
          auditId: `ai-audit-${Date.now()}`,
          time: new Date().toISOString(),
          operator: currentName,
          action: "AI招生归档",
          studentName,
          detail: latestResult?.summary || recordText.slice(0, 100) || "AI 招生整理"
        });
        return state;
      }

      function curriculumRowDraft() {
        const grade = structuredValue("grade") || byId("aiTargetInput").value.trim() || "待定年级";
        const subject = structuredValue("subject") || "数学";
        const lesson = structuredValue("topic", "lesson") || latestResult?.summary || "AI 整理资料";
        return {
          rowId: `curr-ai-${Date.now()}`,
          name: latestResult?.title || `${grade}｜${subject}｜AI 资料`,
          subject,
          grade,
          track: structuredValue("system", "track") || "课内体系",
          type: structuredValue("materialType") || "备课资料",
          classType: structuredValue("classType") || "平时班",
          lesson,
          status: "已录入",
          version: structuredValue("version") || "AI-整理",
          owner: currentName,
          note: latestResult?.internalNote || latestResult?.polishedText || "由 AI 助手整理的资料说明",
          fileName: "",
          fileType: "",
          fileSize: 0,
          fileDataUrl: "",
          fileUrl: "",
          fileStorageKey: "",
          storageKind: "ai-draft",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        };
      }

      async function saveToCurriculumSystem() {
        if (!latestResult) {
          byId("aiMessage").textContent = "请先完成 AI 整理。";
          return;
        }
        let rows = safeParse(localStorage.getItem(CURRICULUM_STORE_KEY), []);
        try {
          const remote = await window.JRC_CLOUD?.readModuleData?.(CURRICULUM_STORE_KEY);
          if (remote?.ok && remote.data?.found && Array.isArray(remote.data.payload)) {
            rows = remote.data.payload;
          }
        } catch (_) {}
        const nextRows = [curriculumRowDraft(), ...(Array.isArray(rows) ? rows : [])].slice(0, 500);
        localStorage.setItem(CURRICULUM_STORE_KEY, JSON.stringify(nextRows));
        const result = await window.JRC_CLOUD?.writeModuleData?.(CURRICULUM_STORE_KEY, "curriculum", nextRows, { replaceMode: "replace" });
        byId("aiMessage").textContent = result?.ok
          ? "已归档到教研与课程产品系统。进入资料台账可按年级、学科或标题查询。"
          : "已先保存到当前设备。网络恢复后会同步到教研与课程产品系统。";
      }

      async function saveToFinanceReview() {
        if (!latestResult) {
          byId("aiMessage").textContent = "请先完成 AI 整理。";
          return;
        }
        let bundle = safeParse(localStorage.getItem(FINANCE_PREIMPORT_KEY), window.JRC_PREIMPORT_BUNDLE || {});
        try {
          const remote = await window.JRC_CLOUD?.readModuleData?.(FINANCE_PREIMPORT_KEY);
          if (remote?.ok && remote.data?.found && remote.data?.payload && typeof remote.data.payload === "object") {
            bundle = remote.data.payload;
          }
        } catch (_) {}
        bundle = bundle && typeof bundle === "object" ? bundle : {};
        bundle.reconciliationIssues = Array.isArray(bundle.reconciliationIssues) ? bundle.reconciliationIssues : [];
        bundle.reconciliationIssues.unshift({
          id: `ai-finance-${Date.now()}`,
          period: structuredValue("period") || new Date().toISOString().slice(0, 7),
          teacherName: structuredValue("teacher") || currentName,
          title: latestResult?.title || "AI 财务核对草稿",
          detail: latestResult?.internalNote || latestResult?.polishedText || latestResult?.summary || "",
          amountClues: structuredValue("amountClues"),
          hourClues: structuredValue("hourClues"),
          missingFields: structuredValue("missingFields"),
          riskPoints: structuredValue("riskPoints"),
          status: "待复核",
          source: "aiAssistant",
          createdAt: new Date().toISOString()
        });
        localStorage.setItem(FINANCE_PREIMPORT_KEY, JSON.stringify(bundle));
        const result = await window.JRC_CLOUD?.writeModuleData?.(FINANCE_PREIMPORT_KEY, "finance-preimport", bundle, { replaceMode: "replace" });
        byId("aiMessage").textContent = result?.ok
          ? "已送入财务系统的 AI 财务核对草稿。财务老师可在草稿区标记已处理或删除。"
          : "已先保存到当前设备。网络恢复后会同步到财务核对草稿。";
      }

      function canArchiveToStudentService(mode) {
        return ["classFeedback", "feedback", "parentCommunication", "attendanceFollowup"].includes(mode);
      }

      function updateActionButtons() {
        const mode = byId("aiModeInput").value;
        const studentButton = byId("saveStudentServiceButton");
        const admissionsButton = byId("saveAdmissionsButton");
        const curriculumButton = byId("saveCurriculumButton");
        const financeButton = byId("saveFinanceReviewButton");
        const taskButton = byId("saveTaskButton");
        if (studentButton) {
          studentButton.hidden = !canArchiveToStudentService(mode);
          studentButton.textContent = mode === "attendanceFollowup" ? "归档缺勤跟进" : "归档学生服务";
        }
        if (admissionsButton) admissionsButton.hidden = mode !== "admissionsFollowup";
        if (curriculumButton) curriculumButton.hidden = mode !== "curriculumArchive";
        if (financeButton) financeButton.hidden = mode !== "financeCheck";
        if (taskButton) {
          taskButton.textContent = ["todo", "task", "admissionsFollowup", "attendanceFollowup", "financeCheck", "curriculumArchive"].includes(mode)
            ? "转成任务"
            : "转成建议";
        }
      }

      function setupVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          byId("voiceStartButton").disabled = true;
          byId("voiceStopButton").disabled = true;
          byId("aiMessage").textContent = "当前设备不支持实时语音识别，可以使用手机键盘听写后再 AI 整理。";
          return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = "zh-CN";
        recognition.continuous = true;
        recognition.interimResults = true;
        let finalText = "";
        recognition.onresult = (event) => {
          let interim = "";
          for (let index = event.resultIndex; index < event.results.length; index += 1) {
            const transcript = event.results[index][0]?.transcript || "";
            if (event.results[index].isFinal) finalText += transcript;
            else interim += transcript;
          }
          byId("aiInputText").value = `${finalText}${interim ? `\\n${interim}` : ""}`.trim();
        };
        recognition.onstart = () => {
          byId("voiceStartButton").disabled = true;
          byId("voiceStopButton").disabled = false;
          byId("aiMessage").textContent = "正在听写，讲完后点停止语音。";
        };
        recognition.onend = () => {
          byId("voiceStartButton").disabled = false;
          byId("voiceStopButton").disabled = true;
          byId("aiMessage").textContent = "语音已停止，可以继续修改文字或点击 AI 整理。";
        };
      }

      byId("voiceStartButton").addEventListener("click", () => recognition?.start());
      byId("voiceStopButton").addEventListener("click", () => recognition?.stop());
      byId("aiModeInput").addEventListener("change", updateActionButtons);
      byId("aiRunButton").addEventListener("click", runAi);
      byId("aiClearButton").addEventListener("click", () => {
        byId("aiInputText").value = "";
        latestResult = null;
        byId("aiResultBox").innerHTML = `<div class="result-item"><strong>等待整理</strong><p>输入内容后点击 AI 整理。</p></div>`;
      });
      byId("copyResultButton").addEventListener("click", async () => {
        await navigator.clipboard?.writeText(resultToText(latestResult));
        byId("aiMessage").textContent = "已复制整理结果。";
      });
      byId("saveDraftButton").addEventListener("click", saveDraft);
      byId("saveAdmissionsButton")?.addEventListener("click", saveToAdmissionsSystem);
      byId("saveCurriculumButton")?.addEventListener("click", saveToCurriculumSystem);
      byId("saveFinanceReviewButton")?.addEventListener("click", saveToFinanceReview);
      byId("saveTaskButton").addEventListener("click", saveToSuggestionTask);
      byId("saveStudentServiceButton")?.addEventListener("click", saveToStudentService);

      setupVoice();
      updateActionButtons();
      renderDrafts();
      window.JRC_CLOUD?.aiAssistant?.({ mode: "health", text: "ping" }).then((result) => {
        byId("aiConfigNotice").textContent = result?.ok && result.data?.provider === "minimax"
          ? "AI 接口已接入 MiniMax。"
          : "AI 页面已就绪；MiniMax Key 配好后会自动调用模型。";
      }).catch(() => {
        byId("aiConfigNotice").textContent = "AI 页面已就绪；MiniMax Key 配好后会自动调用模型。";
      });
    </script>
    <script src="/jrcedu/portal/mobile-unified.js?v=20260623j"></script>
  </body>
