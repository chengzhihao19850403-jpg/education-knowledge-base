<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>排课系统</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;

        background: #f6f8f7;
        color: #172132;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(23, 33, 50, 0.08);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(23, 33, 50, 0.12);

      h1 { margin: 0; font-size: 26px; }
      p { margin: 12px 0 0; color: #627086; line-height: 1.7; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 999px;
        background: #0d9488;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
      a.secondary {
        background: #fff;
        color: #172132;
        border: 1px solid rgba(23, 33, 50, 0.10);
      }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260622b">
  </head>

      <div class="actions">

      if (window.JRC_CURRENT_EMPLOYEE && window.jrcHasPermission?.("paike.access")) {
        window.location.replace("/jrcedu/paike-legacy/index.html");
      }

    <script src="/jrcedu/portal/mobile-unified.js?v=20260622b"></script>
