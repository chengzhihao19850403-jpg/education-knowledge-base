<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>学管知识库系统</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "PingFang SC", "Noto Sans CJK SC", sans-serif;
        background: #f8fafc;
        color: #172132;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid rgba(23, 33, 50, 0.08);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 18px 50px rgba(23, 33, 50, 0.12);
      }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 0; color: #627086; line-height: 1.7; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        margin-top: 18px;
        padding: 0 18px;
        border-radius: 999px;
        background: #0d9488;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <link rel="stylesheet" href="/jrcedu/portal/mobile-unified.css?v=20260623c">
  </head>
  <body data-page-permission="knowledge.access">
    <main>
      <h1>正在打开学管知识库系统</h1>
      <p>这里会跳转到原来的知识库页面，里面保留搜索查询、学管课堂学习内容和阶段测试。</p>
      <a data-requires-permission="knowledge.access" href="/jrcedu/">立即打开</a>
    </main>
    <script src="/jrcedu/portal/cloud-api.js?v=20260623a"></script>

    <script src="/jrcedu/portal/auth.js?v=20260623c"></script>
    <script>
      if (window.JRC_CURRENT_EMPLOYEE && window.jrcHasPermission?.("knowledge.access")) {
        window.location.replace("/jrcedu/");
      }
    </script>
    <script src="/jrcedu/portal/mobile-unified.js?v=20260623c"></script>
  </body>
</html>
